    <style>
        /* 全局样式 - 宣纸底色 */
        :root {
            --rice-paper: #FFFEFC; /* 仿古宣纸色 */
        }
        
        body {
            font-family: "楷体", "宋体", serif;
            display: flex;
            margin: 0;
            background: var(--rice-paper);
            color: #5A4A3F; /* 茶墨色 */
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* 左侧目录 - 青瓷色调 */
        .sidebar {
            width: 300px;
            height: 100vh;
            overflow-y: auto;
            background: #E8F1F2; /* 雨过天青云破处 */
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            position: fixed;
            transition: all 0.3s;
            border-right: 1px solid #D1D9D9; /* 青瓷冰裂纹 */
        }
        
        .sidebar h2 {
            text-align: center;
            color: #3A6351; /* 竹青色 */
            border-bottom: 1px solid #C7D8D2; /* 淡竹叶青 */
            padding-bottom: 10px;
            margin-top: 0;
            font-weight: normal;
            letter-spacing: 2px;
        }
        
        /* 筛选控件样式 */
        .filter-container {
            margin: 15px 0;
            display: flex;
            justify-content: center;
        }
        
        .filter-select {
            width: 300px;
            padding: 8px;
            border: 1px solid #C7D8D2;
            border-radius: 3px;
            background: var(--rice-paper);
            font-family: "楷体", serif;
            font-size: 16px;
            cursor: pointer;
            color: #5A4A3F;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        
        .filter-select:placeholder-shown {
            color: #A8A59B;
            font-style: italic;
        }
        
        .article-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .article-list li {
            margin: 8px 0;
        }
        
        .article-list li a {
            display: block;
            padding: 12px 15px;
            background: rgba(255,255,255,0.7);
            color: #5A4A3F;
            text-decoration: none;
            border-radius: 3px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        
        .article-list li a:hover,
        .article-list li a.active   {
            background: #D1E0D7; /* 嫩荷色 */
            color: #3A6351;
            border-left: 3px solid #3A6351;
        }
        
        .article-number {
            display: inline-block;
            width: 25px;
            text-align: right;
            margin-right: 10px;
            color: #7A8B7B; /* 苔绿色 */
            font-weight: bold;
        }
        
        /* 右侧文章 - 宣纸正文 */
        .content {
            flex: 1;
            margin-left: 340px;
            padding: 40px;
            max-width: 800px;
            background: var(--rice-paper);
        }
        
        /* 文集标题 */
        .collection-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #D1D9D9;
            padding-bottom: 20px;
        }
        
        .collection-header h1 {
            color: #3A6351;
            font-size: 2.5em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.03);
            margin-bottom: 10px;
            margin-top: 0;
            letter-spacing: 5px;
            font-weight: normal;
        }
        
        /* 搜索栏 */
        .search-bar {
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }
        
        .search-bar input {
            padding: 8px 15px;
            width: 300px;
            border: 1px solid #D1D9D9;
            border-radius: 4px 0 0 4px;
            font-family: "楷体", serif;
            font-size: 16px;
            outline: none;
            background: var(--rice-paper);
            color: #5A4A3F;
        }
        
        .search-bar button {
            padding: 8px 15px;
            background: #3A6351;
            color: var(--rice-paper);
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-family: "楷体", serif;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        .search-bar button:hover {
            background: #5A4A3F;
        }
        
        /* 文章内容 */
        .article-content {
            line-height: 1.8;
            font-size: 18px;
            padding-bottom: 80px;
            color: #5A4A3F;
        }
        
        .article-title {
            color: #3A6351;
            border-left: 5px solid #7A8B7B;
            padding-left: 15px;
            margin: 40px 0 25px 0;
            font-weight: normal;
            font-size: 1.8em;
        }
        
        .article-meta {
            color: #7A8B7B;
            font-size: 14px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .article-meta span {
            display: flex;
            align-items: center;
        }
        
        .article-meta span::before {
            content: "•";
            margin-right: 5px;
            color: #C7D8D2;
        }
        
        /* 关键词高亮 */
        .highlight {
            background-color: #F0E6C5; /* 蜜蜡黄 */
            padding: 0 3px;
            border-radius: 2px;
            color: #5A4A3F;
        }
        
        /* 段落缩进 */
        .paragraph-indent {
            text-indent: 2em;
        }
        
        /* 诗和词格式样式 */
        .poem {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: rgba(241,245,240,0.5); /* 蝉翼宣 */
            border-radius: 3px;
        }
        
        .poem-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: #3A6351;
        }
        
        .poem-content {
            white-space: pre-line;
            line-height: 2.2;
            font-size: 1.1em;
        }
 
        /* 诗词正文与注释差异化样式 */
        .poem-content {
            color: #5a3921; /* 正文颜色 */
            font-size: 1.1em;
            line-height: 2;
        }
 
        /* 注释类样式 */
        .annotation {
            color: #8b4513; /* 棕色 */
            font-family: "宋体", SimSun, serif;
            font-size: 0.9em;
            line-height: 1.6;
            border-left: 2px solid #cdaa7d;
            padding-left: 15px;
            margin: 15px 0;
        }
 
        /* 针对特定关键词的样式 */
        p:has(strong:contains("附注")),
        p:has(strong:contains("附记")),
        p:has(strong:contains("注")) {
            color: #666 !important;
            font-style: italic;
        }
        
        /* 加载指示 */
        .loading {
            text-align: center;
            padding: 50px;
            color: #7A8B7B;
            font-size: 1.2em;
        }
        
        /* 悬浮导航按钮 */
        .article-float-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: rgba(248,244,233,0.95); /* 半透明宣纸 */
            border-top: 1px solid #D1D9D9;
            z-index: 90;
            display: none;
        }
        
        .article-float-nav a {
            color: #3A6351;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.8);
            transition: all 0.3s;
            border: 1px solid #D1D9D9;
        }
        
        .article-float-nav a:hover {
            background: #3A6351;
            color: white;
            text-decoration: none;
        }
        
        /* 页面导航样式 */
        .page-navigation {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            background: rgba(241,245,240,0.5);
            border-radius: 5px;
        }
        
        .page-link {
            margin: 0 10px;
            padding: 5px 10px;
            color: #5A4A3F;
            text-decoration: none;
            border-radius: 3px;
            transition: background 0.3s;
        }
        
        .page-link:hover {
            background: #D1E0D7;
            color: #3A6351;
        }
        
        .page-link.active   {
            background: #3A6351;
            color: white;
        }
        
        /* 作者版权按钮 */
        .author-link a {
            display: block;
            text-align: center;
            padding: 10px;
            background: rgba(58,99,81,0.1);
            color: #3A6351;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: all 0.3s;
            border: 1px dashed rgba(58,99,81,0.3);
        }
        
        .author-link a:hover {
            background: rgba(58,99,81,0.2);
            border-color: #3A6351;
        }
        
        /* 移动端适配 */
        @media screen and (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                z-index: 100;
                padding: 15px;
                max-height: 50vh;
                overflow-y: auto;
                transition: all 0.3s;
                border-right: none;
                border-bottom: 1px solid #D1D9D9;
            }
            
            .sidebar.hidden   {
                max-height: 0;
                padding: 0;
                overflow: hidden;
                opacity: 0;
            }
            
            .content {
                margin-left: 0;
                padding: 20px;
            }
            .collection-header h1 {
                font-size: 1.8em;
                letter-spacing: 3px;
            }
            .search-bar input {
                width: 70%;
            }
            
            /* 标签页导航样式 */
            .tab-nav {
                display: flex;
                justify-content: space-around;
                border-bottom: 1px solid #D1D9D9;
                margin-bottom: 15px;
            }
            .tab-nav button {
                flex: 1;
                padding: 10px;
                background: transparent;
                border: none;
                color: #5A4A3F;
                cursor: pointer;
                font-family: "楷体", serif;
                transition: all 0.3s;
            }
            .tab-nav button.active   {
                color: #3A6351;
                border-bottom: 2px solid #3A6351;
            }
            .tab-content {
                display: none;
            }
            .tab-content.active   {
                display: block;
            }
            
            /* 显示移动端悬浮导航 */
            .article-float-nav {
                display: flex;
            }
            
            /* 移动端导航样式优化 */
            .page-navigation {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px;
            }
            
            .page-link {
                margin: 0;
                padding: 8px 12px;
                font-size: 14px;
            }
            
            /* 显示/隐藏侧边栏按钮 */
            .sidebar-toggle {
                position: fixed;
                top: 10px;
                right: 10px;
                background: rgba(58,99,81,0.9);
                color: white;
                border-radius: 50%;
                width: 36px;
                height: 36px;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 101;
                cursor: pointer;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }
            
            .filter-container {
                margin: 10px 0;
            }
            
            .filter-select {
                width: 70%;
                padding: 6px;
                font-size: 14px;
            }
        }
        
        /* 打印样式 */
        @media print {
            .sidebar, .search-bar {
                display: none;
            }
            .content {
                margin: 0;
                width: 100%;
            }

    "content": "<p><br>——仿《周易·系辞》体<br></p><p>夫道者，形而上之谓也。</p><p>无极而太极，太极生两仪，两仪运化而万象森罗。道之为物，惟恍惟惚，然其用不穷：在天成象，在地成形，在人为性。故《易》曰：“一阴一阳之谓道。”阴阳相推，显诸仁而藏诸用，此道之体也。<br></p><p>玄者，妙万物之谓也。<br></p><p>幽深谓之玄，玄之又玄，众妙之门。其理若河图之隐微，其用若洛书之周流。玄非虚诞，实乃天道微明之机：玄龟负文而洪范九畴，蓍草通灵而大衍五十。故圣人观其玄赜，则通神明之德，类万物之情。<br></p><p>道玄相济，显微无间。<br></p><p>道显则玄隐，如日月经天；玄彰则道微，若辰宿列汉。道者其纲，玄者其纬，经纬交络而人文以成。昔伏羲画卦，文王系辞，皆以道玄为枢。今愚子承名，当效天行健，法地势坤，明明德于躬行，通玄览于静观。<br></p><p>赞曰：<br>道无常名，玄非定色。<br>抱一守中，是谓真得。</p><p>注：</p><p>六月十二追记：《聊聊【道玄疏】的写作心事》</p><p>写下《道玄疏》时，案头正摊着泛黄的《周易》注本。窗外的蝉鸣聒噪，倒让人想起 \"道在蝼蚁\" 的老话 —— 越是喧嚣，越想寻个安顿心神的去处。这篇短文仿《周易・系辞》的体例，其实是借古人的笔墨，说自己对 \"道\" 与 \"玄\" 的一点浅见。</p><p>开篇写 \"夫道者，形而上之谓也\"，刻意用了《周易》的句式。儒家说 \"形而上者谓之道，形而下者谓之器\"，我却想把这 \"道\" 拉得更亲近些：它不是高不可攀的教条，而是 \"在天成象，在地成形，在人为性\" 的寻常 —— 就像日升月落是天道，花开花谢是地道，人心里的善恶是非，便是人道的影子。\"无极而太极\" 几句，脱胎于周敦颐的《太极图说》，却悄悄换了重心：太极生两仪，不是为了讲宇宙生成的玄妙，而是想说明 \"阴阳相推\" 才是道的常态 —— 就像白天总要接黑夜，生长总要连凋零，没有一成不变的道理，这才是 \"道之用不穷\" 的真意。</p><p>写 \"玄\" 的时候，总想起老子说的 \"玄之又玄，众妙之门\"。有人觉得 \"玄\" 是虚诞的空谈，我偏想替它辩白：\"玄非虚诞，实乃天道微明之机\"。你看那河图洛书，看似杂乱的点数里藏着天地秩序；蓍草占卜的 \"大衍五十\"，其实是古人用数理丈量天道的尝试。\"玄\" 不是看不见摸不着，而是藏在细节里的密码 —— 就像老农看云识天气，渔夫观浪知鱼汛，那些说不出的 \"门道\"，正是 \"玄\" 的样子。所以才说 \"圣人观其玄赜，则通神明之德\"，不是真的通了神明，而是从细微处读懂了天地的语言。</p><p>\"道玄相济\" 是全篇的骨头。道是显的，像太阳月亮昭昭在天；玄是隐的，像星星藏在云后。可显与隐从来不是分家的：道没了玄，就成了僵死的教条；玄没了道，就成了无凭的空谈。这就像伏羲画卦，一画开天是道，卦象里藏的吉凶悔吝是玄；文王系辞，辞句是道，辞外之意是玄。古人早把这层关系说透了，我不过是用 \"纲纬交络\" 的比喻，再讲一遍罢了。</p><p>结尾的 \"赞曰\"，删改了十几次才定下来。\"道无常名，玄非定色\"，是想破掉人们对 \"终极答案\" 的执着 —— 道从来不是一个固定的名字，玄也不是一种不变的颜色，就像水可以是冰，可以是汽，本质却始终是水。\"抱一守中\" 是落脚点：不必去争道是什么、玄是什么，守住那颗在显与隐、动与静之间平衡的心，或许更接近本意。</p><p>写这篇时，总觉得像在跟古人对话。仿《系辞》的古奥，是想借那股厚重感托住 \"道玄\" 的分量；用白话的心思，是怕说得太飘，让人抓不住。说到底，不过是借文字给自己的困惑找个出口 —— 你看这天地万物，不也在显与隐、有与无之间，生生不息么？</p>"
  },
  {
    "id": 2,
    "title": "道玄疏释",
    "category": "散文",
    "date": "乙巳年五月初一",
    "content": "<p><br>——仿《周易•系辞》体并释法号深意</p><p>夫道者，形而上之谓也。真空妙有，实相无相，正如《金刚经》云\"凡所有相，皆是虚妄\"。无极而太极，太极生两仪，两仪运化而万象森罗，恰似《华严》\"一即一切，一切即一\"之圆融。道之为物，惟恍惟惚，然其用不穷：在天成象，现三十二应身；在地成形，作八万四千度门；在人为性，即众生本具佛性。故《易》曰\"一阴一阳之谓道\"，正合《中论》\"不生不灭，不常不断\"之中道义。阴阳相推，显诸仁而藏诸用，此道之体也，亦般若波罗蜜多之实相。</p><p>玄者，妙万物之谓也。幽深谓之玄，即《法华》所谓\"诸法寂灭相，不可以言宣\"。玄之又玄，众妙之门，实乃不二法门之异称。其理若河图之隐微，暗合《楞严》\"性觉真空\"；其用若洛书之周流，通于\"随缘不变\"之真如。玄非虚诞，实乃天道微明之机：玄龟负文而洪范九畴，犹转法轮于鹿野；蓍草通灵而大衍五十，似拈花微笑于灵山。故圣人观其玄赜，则通神明之德，类万物之情，此即\"明心见性\"之殊胜境界。</p><p>道玄相济，显微无间。道显则玄隐，如日月经天，光明遍照十方；玄彰则道微，若辰宿列汉，妙谛含藏三界。道者其纲，即戒定慧三学；玄者其纬，乃闻思修三慧。经纬交络而人文以成，正是\"佛法在世间，不离世间觉\"。昔伏羲画卦，文王系辞，皆以道玄为枢，犹如世尊说法四十九年；今愚子承名，当效天行健，法地势坤，明明德于躬行即六度万行，通玄览于静观即禅观止观。</p><p>赞曰：<br>道无常名，是名般若；<br>玄非定色，色即是空。<br>抱一守中，不落二边；<br>是谓真得，得无所得。<br></p><p>注：</p><p>六月十二日追记：《从法号到初心：和你细说〈疏释〉里的佛易圆融》<p>此篇以 “释法号深意” 为纲，将《道玄疏》的易理框架与佛法精髓熔铸一炉，别见圆融。</p><p>开篇释 “道”，以《金刚经》“凡所有相，皆是虚妄” 解 “形而上”，用《华严》“一即一切” 释 “万象森罗”，更将 “在天成象” 对应 “三十二应身”，“在人为性” 直指 “众生本具佛性”，使儒家之道与佛家实相浑然相契。释 “玄” 时，以《法华》“诸法寂灭相” 解 “幽深”，借 “玄龟负文” 喻 “转法轮”，“蓍草通灵” 比 “拈花微笑”，让《周易》典故成为佛法机锋的注脚。</p><p>“道玄相济” 一段尤见匠心：以 “戒定慧” 为道之纲，“闻思修” 为玄之纬，暗合 “佛法在世间” 的入世精神；“明明德于躬行即六度万行” 一句，将儒之实践与佛之修行打通，显见 “道玄” 法号中 “知行合一” 的期许。结尾 “赞曰” 以 “是名般若”“色即是空” 收束，既承前文佛理，又点出 “得无所得” 的禅意，使 “疏释” 不仅是字义的注解，更是对法号精神的证悟。</p>"
  },
  {
    "id": 3,
    "title": "道玄疏义",
    "category": "散文",
    "date": "乙巳年五月初一",
    "content": "<p><br>——融通易理与般若之微言</p><p>（开篇以\"拈花\"之笔破题）</p><p>昔释尊拈花，迦叶破颜。这一拈一破间，有个\"函盖乾坤\"的物事在。老僧唤它作\"道\"，学人认它是\"玄\"，殊不知早是第二义了。</p><p>（道章•体用双诠）</p><p>大道无形，生育天地。这个\"生\"字，却要仔细参究：非是母鸡孵卵似的生出，亦非匠人制器般的造作。恰似摩尼宝珠映现五色，明月千江各现全影。故《肇论》云：\"般若无知，无所不知\"，正合《系辞》\"寂然不动，感而遂通\"之妙。天垂象，地呈形，人具性，总不离这一念灵明。若向这里见得透，方知\"一阴一阳\"非是两边话，原是自家屋里事。</p><p>（玄章•显微无碍）</p><p>玄门有三重关：初看山是山，见洛书如观天书；再看山非山，觉河图像镜里痕；末后依旧见山是山，乃知\"九畴\"\"大衍\"尽是衣上珠。昔日达摩面壁，梁王问法，正显这\"玄之又玄\"的机锋：说它无，龟背分明现文字；道它有，蓍草终归是枯茎。这般玄妙，不异赵州\"吃茶去\"三字。</p><p>（合章•圆融观）</p><p>道与玄，似日月相推，实乃一手掌翻覆。显时如百丈野狐现身说法，隐处似维摩默然示疾。经纬交参处，早是文殊仗剑逼佛，何曾有二？愚子既承此号，须是\"高高山顶立，深深海底行\"——运水搬柴时，要识得太极图转；诵经念佛处，须见得八卦爻变。如此方能\"日日是好日\"，不辜负师父赐名苦心。</p><p>（颂曰）<br>道也者，开口便错，<br>玄也哉，动念即乖。<br>不如归去来，<br>看取门前柏树子。<br></p><p>注：</p><p>皈依时，师父理方（鸠摩罗什寺主持，毕业于中国佛学院，留学于斯里兰卡克拉尼亚大学，是临济宗第四十五世传人）赠法号道玄。今作“疏，疏释，疏义”三篇文章纪念。 乙巳年端午日修修订。</p><p>六月十二日追记：《破执归真处，与你同悟〈疏义〉的禅意 —— 兼记师父赐号的深意》</p><p>若说《疏释》是 “解”，此篇便是 “悟”—— 以禅者笔触破斥名相，直探 “道玄” 本真。</p><p>开篇 “拈花微笑” 破题，直指 “道玄” 之名已是 “第二义”，立起 “不立文字” 的禅宗风骨。“道章” 以 “摩尼宝珠映色” 喻 “大道生育”，将《肇论》“般若无知” 与《系辞》“寂然不动” 并观，说明 “道” 非造作，乃是 “一念灵明” 的自然显发；“玄章” 借 “看山三境” 解 “玄之又玄”，以达摩面壁、赵州吃茶的公案，破斥对 “玄” 的执着，显 “即有即无” 的活趣。</p><p>“合章” 更显圆融：“道与玄似日月相推，实乃一手掌翻覆”，打破二者界限；“运水搬柴识太极，诵经念佛见爻变”，将易理与佛法融入日用，呼应 “佛法在世间” 的真义。结尾 “颂曰” 以 “开口便错”“动念即乖” 扫尽言筌，归于 “门前柏树子” 的平常心，恰是对 “道玄” 最深的 “疏义”—— 法号的真谛，不在名相，而在当下的体证。</p><p>三篇一脉相承，从 “疏” 之立义，到 “疏释” 之解理，再到 “疏义” 之破执，终成对 “道玄” 法号的圆满纪念，亦表对理方师父赠法号的恭敬虔诚之心。</p>"
  },

    "content": "<p><br>（乙巳年四月十三至二十三应三省轩主夫妇之邀游无锡）</p><p>依稀车票困归程，无锡淹留岁月更。<br>老友相陪情似海，叨扰半月意难平。<br>相逢旬日如聆教，受诲良多心自明。<br>文似山泉流韵美，情如酱酒溢香盈。</p><p>拈花湾里禅心驻，唐筑灯辉梦亦萦。<br>南寺长街烟火盛，运河舟泛映波明。<br>惠山古镇遗风在，泉韵悠悠念阿卿。<br>蠡水悠悠藏旧梦，范施隐处意含情。<br>王兴记里尝佳味，薄馅鲜汤韵纵横。<br>甜配姜丝酸醋佐，开洋馄饨味难倾。</p><p>良师益友常随侧，古稀不辞路远征。<br>景美情真心已醉，锡城此忆永留名。</p>"

    "date": "乙巳年五月初三",
    "content": "<p><br>黛瓦深庭锁旧年，功罪谁分纸墨间。<br>曾收地租千担谷，亦凿沟渠万亩田。<br>课本犹存批斗语，乡邻却话济民篇。<br>门前石兽苔痕老，一任游人说变迁。<br></p><p>《苔痕》（另一首）<br></p><p>行善不须刻金石， 门前青苔自年年。<br>夜来一阵芭蕉雨， 代尔说尽未言言。<br></p><p>《临江仙·刘氏庄园怀古》<br></p><p>黛瓦青砖藏往事，雕栏见证兴衰。<br>百年风雨几更迭。 文彩名犹在，功过任评说。<br>庄园今昔人纷至，旅游兴旺如潮。<br>当时恩怨已云消。 残阳映古宅，世事半明半暗。</p><p>附记：</p><p>1、前段时间去了成都大邑，参观了刘文彩庄园和建川博物馆。回来后，未及时书写，就淡忘了。昨日与友人小聚，谈起他也于我相近时间去了大邑，也参观了刘文彩庄园和建川博物馆。交谈时，这两个旅游景点的巍峨壮观和宏大气派，以及这两个景点背后的主体人物的故事，让我感慨，感叹。分别作诗词，以纪念。 <br>2、参观完刘文彩庄园，让我有所思，有所想。我记得上小学时，语文课本中有一篇课文就是写刘文彩的，是描写他雇佣长工，剥削农民，是一个反面人物。这次参观，听附近的村民讲：刘文彩在旧社会对当地百姓有造福之功，管理了大片土地，开办了很多作坊，解决了周边百姓的生计。百年后的今天，刘文彩庄园又变成了旅游景点，为本地带来了旅游收入。感慨百年沧桑，世事变迁。人生一世，当为社会做点有益之事方好。</p>"

    "category": "诗",
    "date": "乙巳年五月初三",
    "content": "<p><br>竹椅方桌申酉交，<br>青椒腊肉釜中鏖。<br>五旬掌勺烟熏指，<br>半世添柴月照腰。<br>寻味客，付钞豪，<br>零钱推却说“够了”。<br>寒山若问归何处？<br>道是道明镇里烧。<br></p><p>《道明镇小馆记》<br></p><p>烟雨轻笼道明村，青檐滴翠竹影摇。<br>六友驱车越三十，炊烟袅袅镇口招。<br>巷陌晚霞映匾黄，门楹斑驳岁月长。<br>推门即闻铲声急，白发翁媪灶前忙。<br>老汉颠锅五十载，老妇拣菜步轻盈。 <br>白瓷灶台油光闪，竹筷筒中色微黄。<br>忽闻油锅爆香辛，椒香满室透纱窗。<br>暮色染白老翁鬓，铁勺分羹手微颤。 <br>青瓷碗盛回锅肉，盘中琥珀光闪烁。<br>豆瓣红油浸白肉，蒜泥点缀翡翠妆。<br>藿香鲫鱼汤正沸，豆腐帘丝金汤挂。<br>藤椒耳片最奇绝，麻香扑鼻舌先僵。<br>忆起寒山拾得事，市井亦有隐逸藏。<br>寒山寺内炊烟断，秘谱携归隐道旁。<br>瓷勺碰碗叮当响，竹箸交错语渐稀。<br>拱嘴糯软郡肝脆，卤香浸透三秋霜。 <br>青椒炒得绿意浓，米香飘散四方扬。</p><p>附记：</p><p>应袁磊夫妇邀请参观完刘文彩庄园和建川博物馆后，已到申时，返回住处时，袁磊夫妇请我们一行四人专程去道明镇一家小饭馆品尝地道成都风味特色菜。小饭馆不大，只有一对老夫妇经营，年逾七旬。老汉掌勺50多年，老妇打下手。没有雇工。饭菜上桌后，色香味俱佳。食毕，袁磊结账，按百元整数，未收找回的零钱，以表对老夫妇的敬意。事情虽小，但让我记忆深刻。老夫妇莫非苏州寒山寺的寒山与拾得，自寒山寺归隐，到了道明镇。作诗/词一首，以作纪念。</p>"
  },

    "id": 9,
    "title": "仙侣赋",
    "category": "诗",
    "date": "乙巳年五月初三",
    "content": "<p><br>一、云外仙踪<br>白塔湖波浸晓岚，<br>将军解甲换青衫。<br>廿年未改昆仑色，<br>一笑相逢剑已函。</p><p>二、筑山铭<br>曾执金刀破睛尘，<br>今种春畦带月耘。<br>木屋廿楹亲手起，<br>荒山新拓武陵云。</p><p>三、濠上观<br>鲦鱼空游水成文，<br>惠庄妙辩落花知。<br>君看雾里莼鲈美，<br>唤来陶潜醉酒泉。</p><p>四、白塔禅<br>寺墙红压碧琉璃，<br>塔影摩空蘸水宜。<br>最是晨窗呼吸处，<br>负氧离子养希夷。</p><p>五、竹艺吟<br>道明村外凤尾森，<br>经纬编成大地箴。<br>莫讶农家新别墅，<br>陆游曾此听蝉吟。</p><p>六、别筵<br>罨画池波酿别觞，<br>街子灯暖糯醪香。<br>临歧更赠一筐绿，<br>中有仙园露未晞。</p><p>跋诗<br>昔闻巢父栖尧树，<br>今见邹公辟舜田。<br>若使庄生重观化，<br>定书秋水续新篇。</p><p></p><p>附注：</p><p> 1、邹公：眼科专家‌，曾任解放军25医院院长。<br> 2、仙侣庭园：邹公雅居，崇州市道明镇竹艺村白塔湖畔，半山林中，，占地100亩，湖光山色，园林秀美，空气清新<br> 3、乙巳年四月初五至十三日，应三省轩主夫妇之邀游崇州，友人袁磊夫妇相陪，住仙侣庭园 <br>文释： 一、云外仙踪 青衫：文人服饰。喻从戎马生涯转入归隐生活。 解甲，昆仑：暗喻军旅生涯。 剑已函：“函” 指剑鞘，剑入鞘喻收敛锋芒，喻放下功名，归于淡泊。<br> 二、筑山铭 金刀破睛尘：白内障手术，暗合\"柳叶刀\"的医学象征 春畦带月耘：月下耕种，写归隐后躬耕劳作的闲适。 木屋廿楹：“楹” 为房屋计量单位。 武陵云：化用陶渊明《桃花源记》“武陵人捕鱼为业”，喻隐居之地如世外桃源。<br> 三、濠上观 鲦鱼空游不识字：化用《庄子・秋水》“濠梁之辩”：“鲦鱼出游从容，是鱼之乐也”，写自然本真，不涉世俗智巧。 惠庄妙辩落花知：惠子与庄子的 “鱼乐之辩”，唯有落花（自然）能懂其真意，喻归隐后与自然相融的通透。 莼鲈美：西晋张翰因 “莼鲈之思” 弃官归乡，代指归隐生活的自在；“长安鼎食” 代指官场富贵。<br> 四、白塔禅 寺墙红压碧琉璃：红墙与碧水相映。 蘸水宜：塔影入水。 负氧离子养希夷：“负氧离子” 指清新空气，“希夷” 出自《老子》“视之不见名曰夷，听之不闻名曰希”，指虚静玄妙的境界，写自然滋养身心。 <br>五、竹艺吟 凤尾森：“凤尾” 指竹叶如凤羽，“森” 言竹林茂密。 经纬编成大地箴：竹编的经纬纹理如 “箴（箴言）”。 陆游曾此听蝉吟：陆游一生爱竹、喜隐逸。 <br>六、别筵 罨画池：四川崇州古园林，以水景著称。 糯醪香：糯米酿造的米酒。 临歧更赠一筐绿：临歧指分别路口，一筐绿为亲手种植的蔬果，喻质朴真情。 露未晞：露水未干，写蔬果新鲜。化用《诗经》“蒹葭”意象，喻情谊永恒。<br> 跋诗 巢父栖尧树：巢父为上古隐士，拒绝尧的让位，隐于山林，喻超然物外。 辟舜田：“舜田” 指如舜帝般躬耕的田园，写邹公亲手开辟隐居之所。 庄生重观化：观化出自《庄子》，指观察自然与生命的变化。秋水为《庄子》篇名（天地与我并生，而万物与我为一），赞邹公的归隐生活超越古人，可续庄子哲思。  地若不爱酒，地应无酒泉  </p><p> 创作花絮：</p><p>“唤”“来”二字之妙 <br>唤：</p><p> 1、仿佛陶潜不是远方的嘉宾，而是身边朝夕相伴的知己 —— 一声轻唤，便从东篱下应声而来。 <br>2、暗合邹公归隐后的心境：不再是当年军中院长的郑重，而是褪去身份后的自在，连招呼知己都带着山野间的淳朴，如邻人唤友共饮，更显 “返璞归真” 的松弛。<br> 3、霍去病 “倾酒入泉” 是将士同欢的豪情；李白 “酒泉” 是天地爱酒的旷达；而邹公唤渊明不是宴饮的热闹，而是知己对酌的清幽。<br> 4、邹公在酒泉四十年，酒既是地方符号，也是岁月沉淀的醇厚。“唤” 陶潜共饮，似在与这位 “古今隐逸之宗” 隔空对话，将四十年的风霜、如今的闲适，都 “唤” 进这杯酒里，多了几分 “心有灵犀” 的默契。 <br>5、前两句鲦鱼空游，惠庄妙辩是静观与哲思，第三句君看雾里莼鲈美，是当下的生活实感，末句 “唤来陶潜” 则将这份实感升华为精神共鸣。“唤” 字如一声轻呼，打破了前三句的静谧，却又不张扬，恰似山间清风拂过，自然引出陶潜的形象，让诗意从 “观物” 到 “观心” 再到 “观古今”，流转顺滑。<br> 6、三字对比： 邀：带几分郑重，如设宴待客，偏于 “礼”； 招：带几分洒脱，如挥袖呼友，偏于 “率”； 唤：带几分亲昵，如对坐唤邻，偏于 “真”。<br>  来：<br> 1、来是动态的奔赴，更显陶潜的主动性。仿佛听见一声 “渊明，来饮酒！”，他便提着酒壶从东篱下应声而来，不带半分迟疑 —— 这 “来” 里藏着他 “性嗜酒，家贫不能常得” 的本真，也藏着 “一唤就来” 的洒脱。 志趣相投之谊： <br>2、来是双向的奔赴。邹公唤，渊明来，中间隔着千年光阴，却因 “弃功名、乐归隐” 的同频，让这声 “来” 成了无需言说的默契。来是 “你唤我便来”，平等如友，更显渊明喜邹公、共知音，心意相通。让这份跨越时空的相遇，多了几分 “相见恨晚” 的热络。<br> 3、时空邻居之境： 来打破了古今的隔阂。在邹公的雅居地，雾里莼鲈、竹篱木屋，本就与陶潜的桃花源气息相通 —— 此时的陶潜，不再是史书里的古人，而是隔墙而居的邻人，一声 “来” 便能推门入席。“来” 字，让 “时空邻居” 的想象落地，仿佛陶潜从未走远，就在这山水间，与邹公共饮这杯 “酒泉”。  “唤来陶潜醉酒泉”，一个 “来” 字，让陶潜的形象从 “被邀请者” 变成 “主动赴约者”，从 “历史符号” 变成 “当下知己”，既扣住了陶潜的性情，又映出了邹公的心境，更让 “归隐” 的主题有了跨越千年的呼应 —— 原来古今的知音，从来都在彼此的 “一唤一来” 里，活成了永恒的邻居。<br>  其实古人说 “炼字”，炼的不止是字，更是藏在字后的心意。毕竟好文字，都是 “磨” 出来的。</p>"

    "date": "乙巳年五月初三",
    "content": "<p><br>一、青铜神树</p><p>扶桑九日堕玄精，</p><p>铸就通天神木形。</p><p>三万六千蟠螭纹，</p><p>犹带古蜀祭祀腥。</p><p>二、纵目面具</p><p>突目斜飞欲破空，</p><p>蚕丛魂铸此青铜。</p><p>纵能洞见三千岁，</p><p>难测当年祭祀风。</p><p>三、金杖图腾</p><p>鱼鸟纹缠金杖寒，</p><p>王权神授此中看。</p><p>中原鼎簋巴蜀杖，</p><p>同是祭天礼器观。</p><p>四、祭祀猜想</p><p>雷火焚余骨卜焦，</p><p>先民跪处土犹潮。</p><p>五千年前星坠夜，</p><p>酋长曾祈天不昭。</p><p>五、文明遐思</p><p>巴蜀纹符殷契文，</p><p>黄河长江两龙脉。</p><p>谁言蛮夷无史册？</p><p>青铜自己会说话。</p><p>六、参观后作</p><p>博物馆里空调凉，</p><p>玻璃罩外五千年。</p><p>神树金杖默不语，</p><p>我自心头涌诗篇。</p><p></p><p>附注：</p><p> 八日早上辞别了“仙侣庭院”的好友后，在返回重庆途中，参观了三星堆博物馆。   </p><p> 文释：</p><p>    扶桑九日：神话中 “扶桑” 为东方神树，上栖十日。 <br> 玄精：日月星辰的精华。 <br> 蟠螭：古代传说中无角的龙，神树枝干上有蟠螭纹装饰。<br>“舞” 字赋予纹饰动态感。  祭祀腥：神树用于祭祀。“腥” 残留着远古焚烧祭品的烟火气。    <br>纵目面具：三星堆标志性文物，眼球外凸、耳廓外撇，造型夸张。  <br>蚕丛：传说中蜀国开国君主，其目纵。  <br>纵能洞见三千岁：指面具的 “纵目” 仿佛能看透三千年时光，但即便如此，仍无法完全解读古蜀祭祀的奥秘。    <br>金杖：金杖上有鱼、鸟、人头像纹饰，被认为是王权象征。  <br>蟠：纹饰如蛇般盘绕。 <br> 鼎簋（dǐng guǐ）：中原地区象征权力的青铜礼器，与巴蜀金杖形成文明对比。 <br> 礼器观：强调金杖与中原鼎簋虽形式不同，同为祭祀天地、象征权力的礼器。  <br>骨卜焦：祭祀中用于占卜的兽骨经火烧后呈焦黑状。  <br>土犹潮：想象先民跪拜处的泥土仿佛仍带着当年的潮湿，暗合祭祀时的虔诚与紧张。<br>  星坠夜：上古常以星象为天意示警，“星坠” 可能被视为灾兆。 <br> 昭：昭告，明示。  巴蜀纹符殷契文：三星堆器物上的神秘符号，与 “殷契（甲骨文）” 对比，暗示古蜀文明有自身文字雏形。</p>"

    "content": "<p><br>（四月初十游洪崖洞，问路一店铺女子，恰遇雨，女子赠伞。）</p><p>七绝·洪崖洞遇雨赠伞</p><p>两江烟雨问迷津，<br>素手擎来一伞春。<br>莫道巴山秋色冷，<br>此心暖过海棠温。<br></p><p>词·南歌子<br></p><p>问路洪崖畔，沾衣细雨斜。<br>忽惊素伞绽心花。<br>恰似嘉陵春水、浣轻纱。<br>萍水相逢处，山城气自华。<br>海棠红透万千家。<br>更有一腔热忱、暖天涯。</p><p>注：</p><p>“一伞春”：化无形善意为有形春色，暗合“渝州多夜雨”特征 末句：用重庆市花山海棠作喻，既本土化又超越物理温度 结构：前两句叙事，后两句升华，符合绝句“起承转合”之法 意象体系：以“细雨-素伞-春水-海棠”构建温润意境链 “浣轻纱”：既实写雨景，又虚喻善意净化尘俗 下阕：由个案扩展到城市精神，体现“以小见大” “问路-赠伞-感怀”三重叙事，实现“凡人微光，最动人心”的艺术表达。</p>"

    "category": "词",

    "content": "<p><br>三省轩主，从军亦从政，人情练达，人品耿直，是我学习之楷模。退休二十载，笔耕不辍，名为益友，实则良师。上月无锡访友，友伴我遍游无锡名胜古迹，热情款待，打扰过旬。端阳节至，发来词一首。为表达我之敬仰之情，和词一首：<br></p><p>渔家傲・和端阳节<br></p><p>范祠滴翠莺声哝，<br>王兴笼香惹笑容。<br>十朝欢叙沐儒风。<br>心契共，金樽频举醉情浓。<br></p><p>南寺华光澄俗冗，<br>蠡湖棹影摇诗梦。<br>笔阵纵横摹杰雄。<br>恩谊重，清名雅范千秋诵。</p><p>附注：</p><p>范祠滴翠莺声哝：“范祠” 指范文正公祠，用以纪念北宋名臣范仲淹，其 “先天下之忧而忧，后天下之乐而乐” 的精神传承千年，祠中环境蕴含深厚的文化底蕴。 王兴笼香惹笑容：“王兴” 即无锡老字号王兴记，以制作美味小笼包等特色小吃闻名。 十朝欢叙沐儒风：“十朝” 表示十天，在三省轩主家驻留十日；“欢叙” 意为欢快地交谈、叙旧。“沐儒风” ：沉浸在无锡这座城市浓厚的儒家文化氛围中，范仲淹的精神、当地的历史文化传承，都体现着儒家思想的浸润。 心契共，金樽频举醉情浓：“心契共” 彼此心意相通、契合，情谊深厚。 南寺华光澄俗冗：南禅寺，距今一千四百五十年。始建于梁武帝太清年间，号称\"江南最胜丛林\"。改革开放后以寺兴市，建成了十二万余平方米的综合文化市场--南禅寺文化商城。商城北部为仿明清风格建筑群，南部为仿宋风格古建筑。商城中妙光街已被无锡市政府命名为无锡市旅游街，是4A级旅游景点。“澄俗冗” 意为澄清、涤荡世俗的繁杂琐事与烦恼，寓意在典雅庄重的南禅寺氛围中，心灵得到净化，摆脱尘世喧嚣。 蠡湖棹影摇诗梦：“蠡湖” 因范蠡与西施的传说而富有浪漫色彩，承载着历史文化底蕴。“棹影” 船桨划动时在水面留下的影子，“摇诗梦” 蠡湖的美景与传说，勾勒出心中的梦想与灵感，激发文学创作的情怀。 笔阵纵横摹杰雄：“笔阵纵横” 形容写作时文思泉涌，笔力雄健，如排兵布阵般挥洒自如；“摹杰雄” 指通过文字去描摹、赞颂历史上的豪杰英雄。也暗含三省轩主文学创作的热情及作品追随文豪的志向。 恩谊重，清名雅范千秋诵：“恩谊重” 着重突出彼此之间恩情与友谊的厚重珍贵；“清名雅范” 指高洁的名声、文雅的风范，这里既指三省轩主的品德风范，也暗含对范仲淹等先贤的敬仰；“千秋诵” 表示这样的高尚品德与美好情谊，值得永久传颂铭记。</p>"
  },

    "title": "渔家傲・和端阳节（二）",

    "content": "<p><br>渔家傲・和端阳节（二）<br></p><p>范祠烟雨寻幽步，<br>王兴鲜味留人住。<br>旬日相陪情似注。<br>心暗许，叨承厚意难分付。<br></p><p>唐筑灯摇幽梦驻，<br>蠡湖舟泛清波舞。<br>古镇泉声萦旧语。<br>诗骨竖，良师伴我天涯赴。</p>"

    "content": "<p><br>渔家傲・和端阳节（三）<br></p><p>范祠雨细游人哝，<br>王兴汤鲜勾馋容。<br>旬日勾留承古风。<br>心相通，香醪频举胜香粽。<br></p><p>唐筑灯明驱俗冗，<br>蠡湖波漾诗魂重。<br>墨海行舟效豪雄。<br>恩谊重，清名雅范千秋诵。</p>"

  {
    "id": 16,
    "title": "简朴思",
    "category": "词",
    "date": "乙巳年五月十八",
    "content": "<p><br>菜根咬得滋味长,<br>布衣暖来菜饭香。<br>若问古今兴废事,<br>且看堂前燕绕梁。</p><p>注释：</p><p>一、生存哲学的双重维度 （1）物质与精神的辩证 “菜根咬得滋味长”化用《菜根谭》“咬得菜根，百事可做”，通过咀嚼粗粝菜根的意象，揭示物质匮乏与精神丰盈的辩证关系。菜根的苦涩滋味在时间维度上转化为绵长回甘，暗示苦难对人格的淬炼作用。 （2）简朴生活的审美升华 “布衣暖来菜饭香”构成触觉与嗅觉的通感修辞。粗布衣物的温暖与普通菜饭的香气，在感官体验中达成对简朴生活的审美重构，暗合陶渊明“环堵萧然，不蔽风日”的隐逸美学。 二、历史认知的解构视角 （1）宏大叙事的日常化消解 “若问古今兴废事”将历史学家的宏大命题，与“堂前燕绕梁”的日常意象形成戏剧性反差。通过否定传统历史叙事的权威性，构建起“以小见大”的认知范式。 （2）永恒与变迁的哲学观照 燕子绕梁的意象源自刘禹锡“旧时王谢堂前燕”的典故，但在此处被赋予新的时空维度。飞燕的年复一年与梁木的恒久存在，构成动态与静止的辩证，暗示历史兴衰不过是自然永恒中的短暂涟漪。 三、认知范式的转型路径 （1）从向外求索到向内观照 诗句完成从“问古今兴废”的外求姿态，到“看堂前燕”的内省视角的转换。这种认知路径的转变，暗合禅宗“平常心是道”的修行理念。 （2）时空压缩的诗意呈现 通过将千年兴废压缩为燕子绕梁的瞬间，实现历史纵深与当下体验的时空折叠。这种诗性思维突破线性时间观，构建起立体的认知维度。 四、现代性的启示价值 （1）消费主义的解毒剂 在物质丰裕时代，“菜根滋味”的提出具有反消费主义的警示意义。强调精神满足对物质欲望的超越，呼应当代极简主义的生活哲学。 （2）历史焦虑的缓解之道 面对信息爆炸时代的“历史焦虑症”，诗句提供化解之道：将目光从宏大的历史叙事转向生活现场的细微观察，于平凡处见真章。 结语： 这四句诗构建起完整的认知体系：以简朴生活为根基，通过日常观察解构历史迷思，最终抵达超越时空的哲学境界。其价值不仅在于历史观的革新，更在于为现代人提供了一种诗意栖居的可能性——在菜根的苦涩与燕子的呢喃中，听见永恒的回响。</p>"
  },
  {
    "id": 17,
    "title": "简朴思",
    "category": "散文",
    "date": "乙巳年五月十八",
    "content": "<p><br>简朴思<br>——在粗粝中触摸永恒</p><p>清晨推窗，竹影在青砖上写狂草。檐角垂落的蛛网兜住半片槐花，风过时，花与网皆成水墨。这便是简朴的启蒙课——天地从不以金箔裹石，却让苔痕在墙根绣出年轮。</p><p>陶渊明采菊东篱时，衣襟沾满草籽与晨露，却比任何锦袍都接近永恒。他在《归去来兮辞》中写道：“悦亲戚之情话，乐琴书以消忧”，何尝不是用最朴素的声色构筑精神堡垒？王维辋川别业的竹坞云房，实则是将自然裁剪成窗框里的画轴。那些被现代人斥为“破败”的残荷枯柳，在八大山人的笔下，化作“墨点无多泪点多”的绝响。</p><p>灶台上煨着陈年陶罐，腊肉与萝卜在蒸汽中达成和解。这让我想起苏轼在《菜羹赋》中自嘲：“何用和銮，而自煮此无盐之汤”。当现代人追逐分子料理的幻术时，粗陶碗里的荠菜豆腐羹，正以最原始的方式完成对味觉的启蒙。</p><p>袁枚《随园食单》记载“有味者使之无味”的烹饪哲学，恰似禅宗“平常心是道”的变奏。京都怀石料理将豆腐切成月牙状，配以松针熏制的鲣鱼花，看似精致，实则延续着“和敬清寂”的简素之道。而贵州侗寨的酸汤鱼，用木桶发酵出的酸味，比任何酱料都更接近大地的本味。</p><p>徽州老宅的天井承接四时风雨，雨水顺着瓦当滴落青石，日日年年刻写着《漱玉集》。这种“四水归堂”的格局，暗合《园冶》所言“虽由人作，宛自天开”的智慧。反观现代玻璃幕墙的冰冷森林，那些用LED灯光模拟的“星空顶”，终究照不亮灵魂的暗角。</p><p>日本安藤忠雄的“光之教堂”，用混凝土与十字光束完成对简朴的极致诠释。而苏州博物馆的片石假山，贝聿铭以米芾画意重构山水，在钢筋水泥间保留着“瘦皱漏透”的东方美学密码。真正的建筑大师，都懂得在留白处安放云影。</p><p>祖父的铜壶总在寅时敲响更漏，壶嘴飘出的茶烟，与北斗的斗柄共绘时间的螺旋。这种农耕文明的时间刻度，比手机日历更接近生命的本相。陶弘景在《答谢中书书》中描绘的“晓雾将歇，猿鸟乱鸣”，实则是用二十四节气编织的时光锦缎。</p><p>当都市人困在“碎片化”“即时性”的牢笼里，云南哈尼族的“十月太阳历”仍在梯田上流转。他们用不同颜色的糯稻绘制大地画，让农耕成为最隆重的时光祭祀。这种对季节的虔诚，比任何智能手环都更能丈量生命的质地。</p><p>东京表参道的极简主义橱窗里，一盏清水与枯枝构成“侘寂”的美学标本。这让我想起老子“大巧若拙”的箴言——当消费主义将欲望包装成必需品时，真正的奢侈恰是放下。</p><p>景德镇陶艺家李见深用五年时间复原宋代影青瓷，却故意保留窑变的瑕疵。这些“不完美”的器物，反而成为当代人对抗异化的图腾。就像《菜根谭》所言：“风来疏竹，风过而竹不留声”，简朴不是苦行，而是让灵魂在物的缝隙中自由呼吸。</p><p>暮色漫过窗棂时，我看见陶罐里的野菊悄然绽放。那些被现代性碾碎的时光，正在粗陶的肌理间重新凝结成琥珀。或许真正的奢华，不过是学会在菜根的苦涩里，尝出岁月的回甘。</p>"
  },

    "content": "<p><br>吴苑消夏处。<br>正荷风、三十六陂，暗香飞度。<br>梧竹幽居帘半卷，一榻松涛低诉。<br>更谁见、浣花人伫？<br>拙政园深莺语碎，叹浮生、原是蕉中鹿。<br>残照里，数莲步。<br></p><p>枫桥夜火穿朱户。<br>忽听得寒、山钟杵，惊回鸥鹭。<br>千载唐碑凝冷翠，曾照张继夜泊。<br>待寻取、和合二圣。<br>笑指庭前旧石井，说从来、水月皆心注。<br>烟柳外，雨如酥。</p><p>注释：</p><p>“三十六陂”：化用姜夔《念奴娇》荷塘意象。“蕉中鹿”：典出《列子》，喻人生虚妄。“和合二圣”：寒山拾得合称</p>"

    "title": "水龙吟·高铁地铁双赞",

  {
    "id": 36,
    "title": "重庆下浩里游记",
    "category": "散文",
    "date": "乙巳年五月十五日",
    "content": "<p><br>在长江与嘉陵江交汇处，有一座古老而又年轻的城市——重庆。这里，是巴渝文化的发源地，是火锅的故乡，更是一座充满魔幻色彩的山城。在这座山城中，有一个被时光遗忘的角落——下浩里。今天，我将带你走进下浩里，感受那份独特的韵味。<br>下浩里，位于重庆南岸区，是一条有着百年历史的老街。它依山傍水，青石板铺就的小巷蜿蜒曲折，两旁是古朴的吊脚楼，仿佛诉说着历史的沧桑。<br>走在下浩里的石板路上，仿佛穿越了时空，回到了那个车水马龙、商贾云集的年代。这里的一砖一瓦，都承载着岁月的痕迹，让人不禁感叹时光的流转。<br>下浩里的建筑，是巴渝地区典型的吊脚楼风格。这些木质结构的房子依山而建，临水而居，与周围的山水融为一体，构成了一幅美丽的画卷。<br>走在下浩里的小巷中，你会发现这里的建筑各具特色。有的古朴典雅，有的精致华丽，有的简约大气。每一幢房子都像是一件艺术品，让人赞叹不已。<br>下浩里不仅有着美丽的自然风光和独特的建筑，更有着深厚的人文底蕴。这里曾是重庆的商业中心，商贾云集，文人墨客也纷纷驻足。<br>漫步在下浩里，你会遇到许多有趣的人和事。有卖着地道小吃的小贩，有坐在茶馆里悠闲品茶的老人，还有在江边垂钓的渔夫。他们用自己的方式，诠释着下浩里的生活哲学。<br>重庆是火锅的故乡，而下浩里更是美食的天堂。这里的小吃琳琅满目，让人垂涎三尺。<br>走在下浩里的街头，你会闻到各种美食的香味。有麻辣鲜香的火锅，有外酥里嫩的炸酥肉，还有香甜软糯的红糖糍粑。每一种食物都让人回味无穷。<br>当夜幕降临，下浩里又呈现出另一番景象。华灯初上，江面波光粼粼，两岸灯火辉煌。<br>坐在江边的露天茶馆，喝着盖碗茶，看着江面上往来的船只和对岸的灯火，让人心旷神怡。此时的下浩里，就像一幅流动的画卷，美得让人心醉。<br>下浩里的四季各有特色，每个季节都有不同的韵味。<br>春天，万物复苏，下浩里的树木抽出新芽，江水也变得清澈见底。夏天，绿树成荫，江风习习，人们在江边纳凉。秋天，金黄的落叶铺满小巷，别有一番风味。冬天，虽然寒冷，但人们依然热情不减，在江边垂钓、喝茶、聊天。<br>随着城市的发展，许多老街都面临着被拆迁的命运。但幸运的是，下浩里得到了保护和开发。<br>如今的下浩里，在保留原有风貌的基础上，融入了许多现代元素。咖啡馆、文创店、艺术馆等新兴业态在这里蓬勃发展。古老的下浩里焕发出新的生机。<br>在下浩里漫步了一天，我深深地被这里的一切所吸引。这里的山、水、建筑、人文、美食、夜色、四季、变迁……都让我流连忘返。<br>下浩里就像一颗璀璨的明珠，在重庆这座大都市中熠熠生辉。它见证了历史的变迁，承载了一代又一代人的记忆。希望更多的人能来到这里，感受那份独特的韵味。<br>后记：感谢重庆这座山城赋予我们的一切美好。让我们珍惜这份宝贵的文化遗产，在保护中发展，在发展中传承。愿下浩里的明天更加美好！</p>"
  },

    "content": "<p><br>吃了十年清汤面，才知浓淡总随缘。<br>明日若换阳春面，苏州桥接重庆天。<br>忽忆金城牛大碗，一清二白三红绿，<br>手工抻拉吼秦腔，酸辣穿喉似少年。<br>释义：<br>上月应友人之邀，去无锡游玩。在王兴记品尝了阳春面，故而感慨。作诗一首抒怀。<br>金城：兰州古称<br>一清二白三红绿：清汤为骨（一清），白萝卜片如玉（二白），辣油泼朝霞（三红），香菜蒜苗点春意（四绿），拉面师傅摔面时“啪”的一声响，似秦腔开嗓裂金石。<br>《面乐三叠》<br>苏渝甘对话：阳春面是评弹三弦，吴侬软语。“淡”字藏禅机，是水墨画里的留白，是《菜根谭》“浓肥辛甘非真味”。重庆小面有川剧锣鼓，川伶变脸，麻辣铿锵，是火锅沸腾时的毛肚。兰州牛肉面则是吼秦腔，显西北魂，酸辣穿云，如同“三分剑气七分月光”，是黄河浪尖上的羊皮筏子。</p>"

    "category": "散文",
    "date": "乙巳年五月十五日",
    "content": "<p><br>我总疑心，中国人的魂灵是面做的。<br>十年前在苏州初尝清汤面，瓷碗里沉着几茎银丝，汤色澄澈如虎丘的晨雾。那时不解“至味在淡”的道理，只道是江南人吝啬油水。后来才懂得，这一碗清汤里煮着《红楼梦》里妙玉的梅花雪水，是需用十年光阴才能泡开的禅机。<br>无锡王兴记的阳春面又是另一番光景。面汤比太湖更空明，葱花浮在碗中，竟像惠山寺塔顶的积雪。浇头是素的，笋片、豆干、木耳，排布如倪云林的枯笔山水。吃着吃着，忽然想起评弹艺人指间的三弦——那面汤里颤动的油星子，可不就是弦上滑落的泛音？<br>重庆小面却似川剧变脸。才见红油如赤霞铺满碗底，转眼花椒已在舌尖炸开满天星斗。麻辣之气直冲囟门，恍惚看见嘉陵江上的纤夫，正踩着锣鼓点把太阳拉过十二峰。<br>最是兰州牛大碗教人牵魂。清晨六点，马子禄的拉面师傅已把面团摔得啪啪作响，活像秦腔里的花脸一声吼破天。辣子需泼得艳若敦煌飞天裙裾，醋要淋得爽似黄河九曲。一清二白的汤色里，浮沉着祁连山的月光。西北人吃面要蹲在凳子上，这般架势，倒像是捧着《史记》在读——面碗里分明漾着霍去病痛饮的瀚海。<br>三碗面下肚，忽然了悟：清汤面是《金刚经》，阳春面是《心经》，麻辣小面是《坛经》，牛大碗却是整部《大藏经》。筷子提起时牵丝连缕，哪一根不是三千大千世界？<br>面禅三昧：苏州面碗倒映着园林漏窗，重庆红油沉淀着码头往事，兰州面汤里游动着丝路驼铃。一碗面端起来，便是捧起半部华夏文明史。<br>味觉参悟：清汤之淡，是“看山还是山”的第三重境界。麻辣之痛，恰似明心见性时的当头棒喝。酸辣交攻处，藏着“烦恼即菩提”的密意。<br>匠道相济：拉面师傅摔打面团时的节奏，暗合《黄帝内经》的呼吸法；苏州面汤的文火，炖着陆羽《茶经》的火候诀。</p>"
  },
  {
    "id": 40,
    "title": "面观大千",
    "category": "散文",
    "date": "乙巳年正月十五日",
    "content": "<p><br>第一章 面之始<br>我总记得苏州面馆的清晨。老师傅用黄杨木筷搅动面汤，那漩涡里沉浮的，分明是唐伯虎画废的宣纸屑。朱鸿兴的枫镇大面，汤色如拙政园的池水，浇头里的鳝糊，乃是吴门画派走失的赭石颜料。吃面时，听见评弹叮咚，才知三弦弦柱上，绷紧的都是晒干的面条。<br>第二章 面之变<br>在无锡王兴记，跑堂的吆喝声里藏着算术：<br>“宽汤重青免鲜轻硬面！”<br>这九个字是苏帮面的密码。宽汤要如太湖烟波浩渺，重青需似惠山竹影参差。面挑起时，碗底现出徐霞客游记里的岩层纹理——原来一碗阳春面，竟是一部地理志。<br>第三章 面之狂<br>重庆小面摊的早晨是场革命。红油如井冈山星火，花椒似百万雄师过大江。老板娘抡勺的架势，活脱脱是川江号子传人。最妙是那豌杂面，豌豆熬得烂若《红楼梦》里通灵宝玉失却的包浆，杂酱里肥瘦相间的韵律，分明是杜甫在夔州写的排律。<br>第四章 面之雄<br>兰州城的清晨是被面案声惊醒的。“啪！”——面团摔在青石板上，这是霍去病击匈奴的鼓点。马子禄的拉面师傅，个个是未封神的伏羲：<br>一拉，扯出河西走廊的长度；<br>二拉，丈量丝绸之路的宽度；br>三拉，便是黄河九曲的弯度。<br>辣子油泼下去的瞬间，我看见敦煌壁画里的飞天在碗边起舞。<br>第五章 面之禅<br>后来我懂得：<br>清汤面要“吃气”，是面馆凌晨四点开火的呼吸；<br>小面要“吃声”，是长江水在碗里沸腾的平仄；<br>牛大碗要“吃魂”，是拉面师傅腰带里别着的西北风。<br>某日在寒山寺边吃素面，忽然见碗底映出枫桥——原来张继夜泊时，船头煮的就是这碗面汤。<br>第六章 面之终<br>如今我走遍九州，随身总带着一只空碗：<br>在杭州，它盛过片儿川的雪菜笋片；<br>在开封，它接过鲤鱼焙面的龙须；<br>在广州，它量过云吞面的碱水度。<br>但最难忘还是兰州面馆里那个回族老者的话：<br>“娃娃，面要趁热吃，凉了就是江湖了。”<br>说罢将醋壶一倾——<br>刹那间，我看见黄河拐了个弯，径直淌进了我的碗里。</p><p>附记：</p><p>江湖：与糨糊，浆糊同音 考据：朱鸿兴面店“宽汤重青”九字诀，实为苏州面业行话，暗合《周礼》“八珍”之制。 诗眼：文中“吃气/吃声/吃魂”三境，出自《东京梦华录》“食气论”，今以面道释之。 秘法：文末醋壶倾泻的黄河意象，典出《水经注》“河出醋沟”，化用于此。</p>"
  },
  {
    "id": 41,
    "title": "凉州三套车赋",
    "category": "散文",
    "date": "乙巳年四月十五日",
    "content": "<p><br>壹・行面记<br>凉州的面是拽着祁连山雪水长的。<br>师傅揉面时，<br>总要先朝西北方拜三拜——<br>那面团里醒着的，<br>是霍去病酒泉分酒的豪气，<br>是鸠摩罗什译经时的断句。<br>行面出锅如帛书舒展，<br>卤汁泼上去的刹那，<br>分明听见河西走廊的风，<br>正把汉武帝的诏书<br>一字字烙在面皮上。<br>贰・卤肉颂<br>敦厚似铜奔马的臀，<br>醇香如雷台汉墓的漆器。<br>肥瘦相间的纹理里，<br>藏着凉州词平仄的密码：<br>瘦肉是王翰的“葡萄美酒”，<br>肥膘乃岑参的“雪海阑干”，<br>那黏连的筋膜，<br>定是西凉乐府里<br>辗转千年的转音。<br>叁・茯茶吟<br>红枣在粗陶罐里咕嘟，<br>茶汤渐浓似暮色中的边墙。<br>饮至第三碗，<br>忽然尝出三种时光：<br>初沸时是十六国时的驼铃，<br>再沸时乃西夏文活字，<br>三沸后——<br>竟化作了<br>兰州中山桥铁柱的锈香。<br>肆・三套车<br>行面为辕，卤肉作轼，<br>茯茶便是轮间溅起的烟尘。<br>这驾味觉的马车，<br>从魏晋壁画里驶出，<br>载着凉州大马的响鼻，<br>载着铜奔马的蹄铁声，<br>在食客的唇齿间<br>复刻出一条<br>舌尖上的丝绸之路。</p><p>注释：</p><p>行面筋骨：和面时必用黄河水，其碱性与敦煌壁画地仗层同源，故面条能负千载之重。吃行面时要想起汉简上的隶书。 卤肉魂魄：秘方中有三味料——张掖的草果、天水的花椒、陇南的崖蜜，暗合“天地人”三才。嚼卤肉时需听见大佛寺的梵呗。 茯茶烟霞：茶汤表面的枣脂浮沫，实为未央宫柏梁台露水的转世。饮茯茶刹那当观想马踏飞燕的弧线。 食用秘籍：就着武威文庙的松涛声咀嚼，每口间隔三十秒，以合“三套车”的辚辚节奏。</p>"
  },
  {
    "id": 42,
    "title": "三城食事记",
    "category": "散文",
    "date": "乙巳年四月十五日",
    "content": "<p><br>一、武威：古城的胃<br>凉州的清晨是从三套车的热气里醒来的。<br>行面如汉简，一根根摊开，是未写完的《凉州词》。卤肉肥瘦相间，肥处似雷台汉墓的铜马鞍，瘦处如西夏碑上的刻痕。<br>红枣茯茶滚烫，粗瓷碗底沉着几颗皱缩的枣，像祖父烟锅里的余烬。喝到最后，茶渣在舌尖化作祁连山的雪粒。<br>偶尔有卖腊羊肉夹馍的回民老汉路过，馍皮烙得焦黄，肉塞得满溢——咬下去的瞬间，仿佛咬住了古凉州的落日。<br>二、嘉峪关：钢铁与风沙的滋味<br>在钢城的日子，羊肉粉汤是寒夜的铠甲。<br>羊骨熬汤，撒一把胡椒，辣得人脊背发汗，如烽燧上的戍卒喝退胡风。<br>烧壳子硬如城砖，掰开却酥软，甜味是讨赖河冰层下渗出的暗流。<br>有时下班路过市场，买一份酿皮子。醋汁泼辣，面筋吸饱了关外的风，嚼着嚼着，忽然尝出明代戍卒偷藏的半口乡愁。<br>三、重庆：麻辣里的黄昏<br>而今在渝州，小面的麻辣轰然炸响，却炸不散记忆里的西北味。<br>红油浮满碗沿时，总错觉是黄河上漂来的晚霞。<br>偶尔自己揉一团面，想拉出凉州的宽度，却总拽成嘉峪关的窄——才知手艺里住着故乡的鬼。<br>某日女儿带回火锅底料，沸腾的牛油中，竟捞出一颗来自武威的花椒——原来乡愁是口顽固的锅，越熬越浓。</p><p>附记：</p><p>1、武威味如楷书，横平竖直，是祖父用筷子在桌上画的家谱。 嘉峪关味似魏碑，风骨嶙峋，带着钢铁淬火后的余温。 重庆味像狂草，泼辣淋漓，却总在收笔处，偷偷藏一缕祁连山的雪线。 “人老齿衰时，能咬动的只有旧时光。”，而今我坐在长江边，捧着一碗小面，碗底映出的，却是石羊河的水纹。<br>2、童年在武威<br> 12岁至60岁在嘉峪关<br>现因女儿在重庆，故嘉峪关⇌重庆<br>根在武威，重庆是飘着的梦</p>"
  },
  {
    "id": 43,
    "title": "石羊河旧食单",
    "category": "散文",
    "date": "甲辰年八月十五日",
    "content": "<p><br>一、羊皮筏子上的早餐<br>石羊河畔的人家，米汤油馓子是晨钟。<br>馓子掰碎时“咔嚓”一声，惊飞水洼里的麻鸭——那分明我七岁时弄断的铅笔尖。<br>米汤浮着油星，碗底沉着未化的糖粒，像河床上不肯远走的鹅卵石。<br>母亲总说：“慢些吃，小心噎着。”<br>而今我才懂，她真正怕的，是我咽下太快，<br>把武威的晨光也一并吞尽了。<br>二、河岸野食<br>沙葱在四月最嫩。<br>你跟着牧羊人采撷，指甲缝里嵌满沙粒，<br>嚼碎的草茎迸出酸汁，<br>恍惚是匈奴人遗落的马鞭滋味。<br>偶尔挖到锁阳，啃一口涩得皱眉——<br>多年后我在重庆火锅里涮黄喉，<br>忽然想起那截锁阳，<br>原来童年早就教我：<br>最珍贵的味道，总要先苦一苦舌头。<br>三、消失的甜<br>供销社玻璃罐里的姜糖橘饼，<br>裹着白糖霜，硬得像小号烽燧。<br>攒够五分钱才能买一块，<br>含在嘴里化开时，<br>甜得让我忘记父亲被风沙皴裂的手背。<br>去年我在磁器口见到相似的糖，<br>买来含住，却尝出<br>五块钱一公斤的旧时光，<br>早已通货膨胀。<br>四、河神的宴席<br>石羊河干涸那年，<br>我在龟裂的河床上捡到：<br>半片驴肉馆的蓝花碗（缺角处粘着陈年酱汁）<br>生锈的羊杂碎剪刀（刃口还咬着一段羊肠）<br>以及三套车老板的算盘珠子（拨一粒，就响起一声凉州鼓点）<br>这些，我都装进搪瓷缸子，<br>如今在重庆阳台上，<br>它们正与山城的雾汽<br>慢慢长出晶霜。</p><p>注：</p><p> 童年在武威<br> 12岁至60岁在嘉峪关<br>现因女儿在重庆，故嘉峪关⇌重庆<br>根在武威，重庆是飘着的梦</p>"
  },
  {

    "title": "解忧鼎鼐真言",
    "category": "诗",
    "date": "甲辰年十月十五日",
    "content": "<p><br>一、水米相逢<br>凉州小米黄如佛首光，<br>入扬子江便成了<br>流动的须弥山。<br>你拿重庆竹筷搅动时，<br>漩涡里现出三界：<br>上层浮沫是嘉峪关的晓雾<br>中层米油乃石羊河的水纹<br>底层沉着的，<br>竟是雷台汉墓铜奔马<br>蹄铁上刮下的星辰屑</p><p>二、面引乡魂<br>荣昌挂面入釜的刹那，<br>所有断裂的根须开始疯长——<br>凉州的谷穗向南，<br>重庆的麦芒朝北，<br>在长江与石羊河的<br>经纬交汇处，<br>结出一张<br>味觉的蜘蛛网。</p><p>三、鼎沸三昧<br>啜饮时默诵：<br>“小米是前世的精魂，<br>面条是今生的脐带，<br>扬子江水<br>冲得淡海藏，<br>冲不散<br>武威城头<br>那缕炊烟的<br>脊椎。”</p><p>注：</p><p>1、鼎鼐：中国古代重要的青铜器，主要用于烹饪和祭祀。鼎是一种三足两耳的炊具，而鼐则是一种大鼎，通常用于盛放食物或酒。它们不仅是实用器具，也是权力和地位的象征。在古代，鼎常被用作国家政权的象征，如“定鼎中原”表示建立政权。此外，鼎鼐还具有文化意义，常出现在文学作品中，象征着稳定和繁荣。扬子江：长江统称。石羊河：武威重要水系。荣昌：重庆市荣昌区。海藏：武威海藏寺。雷台汉墓铜奔马：武威重要古迹。 后记： 火候诀：大火烧开时默诵《凉州词》，文火慢熬时哼唱《川江号子》，关火前须大喊三声：“收汁！收魂！收脚印！” 佐食偈：配荣昌卤鹅的翅膀尖（骨缝里有巴蜀的云），就武威醋泡蒜（每瓣都是缩小的白塔寺），最后撒一撮兰州苦水玫瑰——此乃红尘与红尘的量子纠缠。<br>2、童年在武威<br> 12岁至60岁在嘉峪关<br>现因女儿在重庆，故嘉峪关⇌重庆<br>根在武威，重庆是飘着的梦</p>"

    "category": "散文",
    "date": "乙巳年五月十五日",
    "content": "<p><br>一、兰州牛大碗朝圣<br>“下个二细”<br>在嘉峪关吃兰州面，需用暗语：<br>蒜苗要“多搭些”（武威人血脉觉醒）<br>辣子需“满上”（红油须盖住讨赖河落日）<br>加肉时喊“肥瘦相间”（如祁连山雪线分明）<br>面汤真言<br>第一口先啜汤，让陇中黄土地在舌尖沉降；<br>第二口挑面，感受拉面师傅抻进面条里的秦腔韵脚；<br>第三口咬蒜，此刻嚼碎的是河西走廊两千年的风霜。<br>二、母亲的羊肉香头面<br>羊腿肉（选花海农场放养的，啃过农场老房子废址上长出的新草）<br>手擀面（揉面时需播送凉州贤孝《十三孝》）<br>老陈醋（武威东关醋坊的，瓶底沉着母亲带我到菜市场卖菜时丢失的硬币）<br>羊肉切丁如骰子大小（隐喻人生得失）<br>炝锅时投花椒十三粒（对应河西十三州）<br>下面前向东南方撒一撮盐（祭奠我留在重庆的汗）<br>“母亲的离世，<br>解构重组了<br>我后半生的<br>所有乡愁。”<br>三、风物备忘录<br>面朝酒钢公园西北角的晨雾吃面，每一口都能咀嚼出十五宿舍后面自建房的五味。<br>远眺新城魏晋墓啃羊蹄，每一口都是母亲苦难日子的注脚。</p><p>附注：</p><p>废址：1977年冬，我们一家人从武威农转非到了酒钢花海农场，住在选矿厂家属房，后废弃。 十五宿舍：1980年，父亲在十五宿舍锅炉房烧茶炉，就近空地自建房一院，现已拆除。 重庆的汗：2021年，随女儿居住重庆，夏秋酷热。<br>童年在武威<br> 12岁至60岁在嘉峪关<br>现因女儿在重庆，故嘉峪关⇌重庆<br>根在武威，重庆是飘着的梦</p>"
  },

    "content": "<p><br>一锅巴渝麻辣火，<br>半碗陇上风尘。<br>桌前字字煮乡魂。<br>石羊河倒流，<br>溅湿方絮纹。<br>梦里母亲揉面手，<br>抻开半世离分。<br>嘉峪关雪落无声。<br>收梢一句是：<br>“面要趁热吞。”</p><p>注：</p><p> 童年在武威<br> 12岁至60岁在嘉峪关<br>现因女儿在重庆，故嘉峪关⇌重庆<br>根在武威，重庆是飘着的梦</p>"

    "date": "癸卯年三月十五日",
    "content": "<p>第一口：<br>小米沉底如敦煌星宿图，<br>馓子折断似雷台汉墓简，<br>酥脆声是河西走廊的晨钟。</p><p>第二口：<br>稀饭浮沫幻化雪山倒影，<br>筷尖搅动时——<br>石羊河的水纹<br>与重庆的雾<br>在碗沿谈判</p><p>第三口：<br>忽然嚼到一粒未化的糖，<br>才知：<br>六十年人间烟火，<br>不过是<br>母亲年轻时<br>偷偷藏进的<br>半勺甜。</p><p>注：</p><p> 童年在武威<br> 12岁至60岁在嘉峪关<br>现因女儿在重庆，故嘉峪关⇌重庆<br>根在武威，重庆是飘着的雾</p>"

  {
    "id": 49,
    "title": "母亲的米汤油馓子",
    "category": "诗",
    "date": "癸卯年三月十五日",
    "content": "<p><br>卷一：食材转世录</p><p>米汤：<br>选古浪黄渠水浇灌的粟，<br>颗粒要小如西夏文残碑的标点，<br>熬煮时——<br>火候是霍去病军灶的余温，<br>稠度按鸠摩罗什译经的节奏<br>油馓子：<br>母亲揉面时，<br>掌纹里会溢出《凉州贤孝》的韵律；<br>油炸瞬间，<br>锅边泛起的气泡，<br>都是铜奔马踏飞的雪沫</p><p>卷二：食用秘籍</p><p>捧碗观想：<br>碗沿缺角处，<br>住着我五岁时磕破的牙印<br>馓子蘸汤：<br>酥脆与绵稠交锋时，<br>会听见：<br>“咔嚓——”<br>这是童年的门闩<br>被味觉撬开的动静<br>终极密意：<br>碗底最后一口，<br>务必留给<br>1977年冬天的自己<br>（那年离开老房子，<br>养了多年的白狗<br>送我们走了<br>好远<br>好远）</p><p>卷三：味觉舍利</p><p>母亲仙逝后，<br>我发现：<br>她留下的面盆，<br>仍自动生成七月十五的馓子<br>灶台裂缝里，<br>长出的不是霉斑，<br>而是微型河西走廊<br>（用放大镜可见：<br>祁连雪水正流过<br>发丝细的河床）</p><p>传世真言：</p><p>下次煮粥时，<br>要默诵：<br>“米是粟，<br>汤是血，<br>馓子是骨节，<br>母亲是佛。”</p><p>注：</p><p>这碗米汤油馓子是母亲成佛后，在佛界给我们全家做的。</p>"
  },
 {
    "id": 50,
    "title": "鹧鸪天·谢建礼友爱",
    "category": "诗",
    "date": "乙巳年六月",
    "content": "<p><br>解褐重尝市井烟，故交星散似秋蝉。<br>独携旧酿温残梦，肯对寒灰拨死燃<br>斟楚水，泻吴笺，与君剖胆话当年。<br>人间别有冰霜谊，不在樽前在劫前<br></p><p>注释：</p><p> 解褐重尝市井烟，故交星散似秋蝉：</p><p>“解褐” 原指脱去官服，此处暗指离开官场、回归平民生活。<br>重尝市井烟 <br>写出对俗世烟火的重新体验，而 “故交星散” 则以秋蝉凋零作比，道尽旧友离散、各奔东西的怅然，<br>开篇便奠定了时光流逝、人事变迁的基调。 </p><p> 独携旧酿温残梦，肯对寒灰拨死燃：</p><p>“旧酿”“残梦” 呼应过往记忆，独自温酒的孤寂中，藏着对往昔的眷恋；</p><p>寒灰拨死燃</p><p> 以生动意象，写出即便情谊看似冷却，仍愿主动拾起、试图重燃的执着，暗含对旧情的珍视。</p><p>  斟楚水，泻吴笺，与君剖胆话当年：</p><p>“楚水”“吴笺” 以地域意象拓宽空间感，仿佛将山河融入酒中、写进信里。</p><p>剖胆话当年</p><p> 则直抒胸臆，道尽与友人重逢时，毫无保留倾诉过往的坦诚，画面感中满是久别重逢的激动。 </p><p> 人间别有冰霜谊，不在樽前在劫前：</p><p>此句为点睛之笔。“冰霜谊” 喻指历经考验的坚韧情谊，它不流于宴饮欢场的 “樽前” 应酬，而在共渡 “劫前” 困境的患难与共中沉淀。看似淡然的感慨，实则道出真情的真谛 —— 经得起风霜，才是人间至谊。</p><p> 全诗以个人境遇的变迁为线，串联起对友情的追忆与感悟，从离散的怅惘到重逢的坦诚，最终落脚于患难见真情的哲思，情感层层递进，余味悠长。</p>"
  },

    "category": "其他",
    "date": "未标注日期",
    "content": "<p>她揉面的手，<br>皴裂处嵌着：<br>1977年的糠皮<br>农场灶台的煤灰<br>夜半喂猪时沾的露水<br>可那掌心纹路，<br>偏偏长成<br>两株麦穗<br>——后来我才知道<br>那叫**“菩萨的掌纹田”**<br>第二幕・转法轮<br>两个儿子：<br>大儿是敦煌石窟里<br>逃出来的飞天，<br>小儿乃铜奔马<br>失散的蹄铁。<br>当他们在城市扎根，<br>大姐的围裙口袋<br>开始自动吐出：<br>大学录取通知书（带馓子油渍）<br>孙子乳牙（包在《心经》废稿里）<br>第三幕・涅槃香<br>如今她坐在<br>嘉峪关的夕阳里拆毛线，<br>毛线团滚过地板时——<br>一个变成优秀工作者奖状<br>一个滚成全家福的相框<br>最神奇是那锅灶：<br>明明只煮小米粥，<br>飘出的香气<br>却让整栋楼的住户<br>集体梦见<br>河西走廊的麦浪</p>"

    "title": "给大姐的一封家书",
    "category": "书信",
    "date": "乙巳年春节",
    "content": "<p><br>大姐啊：<br>昨夜我梦见武威的月亮掉进面盆，您伸手一捞——捞起的竟是年轻时喂猪的泔水瓢。您却笑了，说：“你看，这瓢底粘着的玉米渣，后来都长成了花海农场的麦子。”<br>您总说自己是睁眼瞎，可您认得：<br>面缸里每粒面粉的来世（它们注定要变成孙子书包里的满分试卷）<br>煤炉上每朵火苗的佛性（那蓝色焰心正在超度您1983年冻僵的脚趾）<br>甚至能从油果子断裂声里，听出大儿子几时升职，小孙子哪天换牙<br>记得那年您把丰收的棉花卖了，给白睿凑房款。如今在嘉乐的辅食碗里，每天清晨都在唱：“奶奶是尊活菩萨，眉间白毫是面粉，掌心千辐轮是面痂。”<br>您抱怨自己腌的酸菜不如从前脆了。可您知道吗？去年冬至，您在瓦缸边沿蹭破的血痂，现在已长成罐身上新的釉彩——那分明是观音菩萨手中的杨柳枝啊！<br>您五十岁以前，最远只到过兰州。但您擀的面条，可绕地球三圈。你种的棉花，飞絮已到了天涯：<br>行面抻的比酒钢的线材还长，变成了白帆工位牌上的丝绦<br>棉花的飞絮到了保险公司，化作白睿办公室的抽象画<br>最倔的那根面头，至今还在您面盆底倔强地站着，像极了您当年扛着铁锨，在棉花地浇水的背影<br>那日嘉峪关落雪，我忽然明白：<br>您这一生，根本是尊会喘气的弥勒佛——<br>布袋里装的是没扔的塑料袋（攒着给孙子当风筝）<br>大肚皮里揣着全家生辰八字（比寺庙的功德簿还全）<br>连笑声都带着发酵过度的面香（那是菩萨特有的体味）<br>回家那天，我要悄悄的对你说：<br>“您散落在棉花地里的飞絮，<br>在天上连成了北斗七星。<br>最亮的那颗，<br>是您1965年<br>省下的半口馍馍<br>化的舍利。”</p>"

    "content": "<p><br>此痛何时已？<br>任黄河、奔流到海，难淘悲髓。<br>四十七年荆棘路，八子存七余几？<br>最蚀骨、双妹别离事：<br>舅抱六妹霾满天，更军侣携幼滂沱雨。<br>母蜷炕，血泪涸。<br>白犬衔穗北风里。<br>记当年、克扣工分，晒场昏厥。<br>五奶掐人中救转，残月照茅檐水。<br>幸天眼、丙辰迁徙。<br>儿女成龙终反哺，<br>却盂兰惊雷、佛接西归矣！<br>十载泪，裂天地。<br>今悟菩提真如理：<br>原慈亲、菩萨化身，历劫度世。<br>万顷麦浪千重厦，尽是母德所庇。<br>看儿孙、南北开枝。<br>寸草难报三春晖，<br>纵精卫填海、恨无期！<br>焚此词，当纸钱祭。</p><p>注：</p><p>\"此痛何时已\"表达对母亲去世的无尽哀思。 \"黄河奔流到海\"比喻母亲的恩情如黄河般广阔。 \"四十七年荆棘路\"反映母亲一生的艰难。 \"双妹别离事\"指六妹和七妹的分离。 \"白犬衔穗北风里\"象征希望与坚韧。 \"五奶掐人中救转\"描述母亲在危难时刻得到的帮助。 \"丙辰迁徙\"指家庭搬迁到农场。 \"儿女成龙终反哺\"表达子女成年后未能尽孝的遗憾。 \"今悟菩提真如理\"表达对母亲菩萨心肠的顿悟。 \"焚此词，当纸钱祭\"以词代祭，表达对母亲的深切怀念。</p>"
  },

  {
    "id": 65,
    "title": "《蜀道畅》VS《蜀道难》",
    "category": "诗",
    "date": "乙巳年五月十五日",
    "content": "<p><br>噫吁嚱！古云蜀道难，难于上青天，<br>而今蜀道畅，畅若行平川！<br>昔日鸟道萦绝壁，猿猱欲度愁攀援；<br>今朝天堑变通途，高铁如龙穿山峦。<br>忆往昔，剑门峥嵘而崔嵬，一夫当关万夫哀。<br>栈道钩连危石间，商旅踽踽心胆寒。<br>滟滪堆前浪拍天，舟楫难渡泪潸然。<br>蚕丛鱼凫开国远，崎岖古道岁月残。<br>看如今，银桥飞架云霭间，长虹卧波连蜀川。<br>雅西高速盘玉带，云端天路入画卷。<br>隧道逶迤穿层嶂，瞬间跨越万重山。<br>成都天府机场立，银鹰展翅翔宇寰。<br>中欧班列鸣笛去，贯通丝路连亚欧。<br>蜀江水碧蜀山青，高铁穿梭似流星。<br>朝发锦城霞光里，暮至长安灯火明。<br>昔时蜀道，阻绝了多少游子归乡梦；<br>今日通途，承载着万千希望向未来。<br>科技筑就通天路，蜀地繁荣展新颜。<br>蜀道之畅，畅在交通之便捷，<br>畅在经济之腾飞，<br>畅在民心之欢悦。<br>且放豪情云端上，笑看蜀道谱新章！<br>蜀道畅，畅四方，锦绣前程万里长！</p>"

  {

    "category": "诗",
    "date": "甲辰年八月十五日",
    "content": "<p><br>噫吁嚱！通途惯星汉！<br>蜀道之畅，畅逾登云巅！<br>蚕丛鱼凫辟鸿蒙，天梯接霄秦塞关。<br>西当太白贯长虹，自驾如御风。<br>地崩山摧化遗韵，今朝铁龙游碧江。<br>上有六龙回日轨，下有云梯吻瀑泉。<br>黄鹤逍遥瞰霞色，猿猱嬉跃镜湖天。<br>青泥何盘盘，百步九折入岫烟。<br>隧道吞雾成仙窟，车流浮光星河间。<br>忽闻子规鸣空谷，清音散作玉珠圆。<br>剑阁朝霞熔金阙，秦岭夜壑灯不眠。<br>蜀道之畅，畅逾登云巅！<br>连峰接踵展画卷，倏然已忘日月迁！<br>枯松倒挂泻苍翠，飞湍瀑流喧玉渊。<br>玻璃栈道裁霞帔，笑揽银河落九川。<br>观景平台托沧海，万壑云涛掌心埋。<br>索道横簪青鬓侧，流光绣破千嶂颜<br>其美也若此，安得不醉倚青鸾！<br>剑阁峥嵘崔嵬立，一车划破万古烟。<br>所守皆是蓬莱客，遥指松云续断弦。<br>朝饮流云夕钓月，帐隐松涛，火燎天穹。<br>安栖山泉旁，舀来青涧水。<br>磨牙吮血，烹于星烬。<br>围炉笑染，半山胭脂 。<br>松风煮茶，犹如管弦。<br>花雨纷扑，助烤佳筵。<br>金城虽云乐，怎比抱月漱清泉？<br>蜀道之畅，畅逾登云巅！<br>邀友穿今古，侧身西望烟霞满天边！</p><p>注：</p><p>金城：兰州古称 <br>2014年10月1日至5日携夫人，自驾从嘉峪关至重庆。途径陇南徽县，游览花映三泉生态旅游景区；广元剑阁县，游览剑门关旅游景区，感慨现代交通之便利和旅游景区的开发，仿李白《蜀道难》作《蜀道畅》。</p>"

    "title": "沁园春·黄河铁桥怀古",
    "category": "词",
    "date": "甲辰年八月十五日",
    "content": "<p><br>铁骨横波，寒星铸铆，浊浪吞秋。<br>任左公柳老，驼铃锈蚀；洋灰缝裂，岁月奔流。<br>曾渡征鞍，也栖胡雁，暗把河声锁铁喉。<br>斜阳里，看钢梁斑驳，犹刻庚戌。<br>当年德匠西来，算此物、竟成第一楼。<br>纵轮机震耳，难惊白塔；烽烟蔽日，未改金瓯。<br>今我重临，霓虹贯顶，车影如梭补旧愁。<br>凭栏处，有千年水鬼，笑数新舟。</p><p>注：</p><p>“庚戌”：桥成于宣统元年（1909年），干支纪年庚戌 “德匠”：德国泰来洋行承建，工程师满宝本、德罗等 “第一楼”：时称“天下黄河第一桥” “水鬼”：黄河捞尸人旧称，此处化用为历史见证者</p>"

    "category": "诗",
    "date": "乙巳年六月",
    "content": "<p>——致敬戈壁钢城奠基者</p><p>【开篇】<br>祁连雪魄化钢魂， <br>镜铁玄精铸剑痕。 <br>五万征鞍披月处， <br>一炉星火破晨昏。</p><p>【卷一·拓荒】 <br>当祁连的雪水浸透戈壁的年轮，<br>当镜铁山的矿脉在玄武岩下苏醒，<br>戊戌年（1958）的汽笛刺破荒原：<br>五万脊梁作柱，十万汗雨为浆，<br>在朔风与砂砾的合谋中，<br>淬炼出大西北第一缕钢铁晨曦。</p><p>【卷二·淬火】 <br>冻土层的测量仪，<br>焐热在拓荒者怀中， <br>沙暴里的经纬仪，<br>长成钢铁的脊椎。 <br>帐篷如诺亚方舟摇晃， <br>马灯似不灭星辰燃烧。<br>那些把青春碾成矿粉的日子，<br>每粒铁矿砂都记得他们掌纹的温度。</p><p>【卷三·铸魂】 <br>三年饥馑的寒风冻僵蓝图，<br>千余名留守者用体温守护高炉：<br>像守护先天不足的婴儿， <br>用粮票糊住漏风的图纸，<br>以《矛盾论》煮沸冻僵的柴油。</p><p>甲辰年（1964）的夯歌震落冰凌，<br>庚戌年（1970）的铁水喷薄而出，<br>赤色岩浆照亮共和国饥渴的瞳孔。<br>那些黧黑的脸庞在钢花里绽放，<br>比祁连雪峰更耀眼的，<br>是他们龟裂手掌托起的朝阳。</p><p>【卷四·涅槃】<br>从\"有铁无钢\"的叹息， <br>到\"锌铝镁\"的冷艳锋芒， <br>六十年淬炼的不只是钢锭：<br>转炉车间蒸腾的， <br>是整代人的青春年华； <br>连铸机流淌的， <br>是西北工业的银色史诗。</p><p>【终章·丰碑】 <br>如今我见： <br>电解铝的镜面倒映祁连月， <br>光伏板阵列如《周易》卦象铺展。 <br>但最坚硬的合金， <br>永远是老酒钢人脊梁的弧度：<br>他们的皱纹里， <br>藏着比镜铁山更丰富的矿脉； <br>他们的白发中， <br>有高炉永远不灭的火光。</p><p>【跋】 <br>所谓铁山精神， <br>不过是凡人以血肉之躯， <br>在风与火的炼狱里， <br>一遍遍书写： <br>\"钢铁，就是这样炼成的！\"</p><p></p><p>注解：</p><p> 1955年，镜铁山矿被发现。1958年，选定厂址在酒泉城西二十公里、嘉峪关城楼东五公里之间的戈壁滩上，定名为“酒泉钢铁厂”。同年8月1日，酒泉钢铁公司在酒泉正式成立。12月15日，举行高炉、焦炉等七大工程全面开工典礼。</p>"

    "title": "沁园春·花海农场废墟吟",
    "category": "诗",
    "date": "乙巳年五月初三",
    "content": "<p><br>铁锹锈矣，井台塌矣，葵花瘦矣。<br>叹渠干树槁，当年标语；<br>水泥剥落，犹见\"奋战\"。<br>拖拉机骸，配电房框，<br>蜥蜴穿行黑板前。<br>最惊心：见残垣断壁，<br>稚子画残。</p><p>五十八年去也！<br>算几代青春埋此间？<br>忆春种甜瓜，秋收玉米；<br>露天电影，食堂炊烟。<br>滴管如弦，场主似弈，<br>空留枯树守旧盟。<br>斜阳外，<br>有沙鼠窜过，<br>惊起铁锹鸣！<br></p><p>注释：</p><p> 1、滴管如弦，场主似弈：意指农场主获益享受，搏取利益。<br>2、创作背景见《沁园春·花海农场忆旧》<br>3、本首侧重“废墟细节 — 历史反思” 的碎片化表达，将个体命运与时代政策勾连，兼具批判意识。</p>"

  {
    "id": 79,
    "title": "沁园春·花海农场忆旧",
    "category": "诗",
    "date": "乙巳年五月初三",
    "content": "<p><br>钢城北望，断山口外，别有洞天。<br>忆当年会战，百场争先；<br>铁锹翻浪，汗透荒原。<br>自力更生，战天斗地，<br>誓把戈壁变良田。<br>看今朝：这葵花万亩，<br>犹记当年？</p><p>时光流转如烟，<br>叹旧貌新颜两重天。<br>见道路坑洼，尘土飞扬。<br>房屋倒塌，野草横生。<br>枯树无言，残垣静立，<br>默数沧桑几十年。<br>最惊心：<br>那冻死羝羊，<br>白骨指天<br></p><p>附记：</p><p> 1、从上世纪八十年代末，随着国民经济的发展，人民生活水平的提高，粮食，蔬菜，瓜果不再匮乏，“自己动手，丰衣足食”的历史一去不复返。市属机关，事业，企业单位也就不再经营农场。之后，酒钢主体产业调整，对花海农场不再投入发展。各二级单位全部撤回，集中精力搞主体产业。对过去开发的大量土地，统一管理，成立了一个新的单位，只留少数管理人员（约20人），负责土地出租，收取土地租赁费。承租土地的主要是原农场的部分家属，和周边的农民。种植作物主要是棉花，向日葵。在这种情况下，农场基础设施遭到了破坏，水井废弃，树木枯萎，道路年久失修，生态环境极度恶化。外来个体开发者，注重自家土地的效益，滴管法取代了水渠。致使原水渠干涸，大量的防护林枯死。由于戈壁滩平坦，方便机械化种植，人员也就大大的减少。因此，今日的花海农场人烟稀少，破败不堪。近年，我去过多次，每次去，都要到废弃的旧址（我生活了近10年的家）看看，每次都感慨，叹息！<br>2、本首侧重 “奋斗史 — 荒废史” 的线性叙事。</p>"

  {
    "id": 80,
    "title": "道玄文集》公众号开篇辞",
    "category": "文",
    "date": "乙巳年六月十三",
    "content": "<p><br>——以文载道，以字传玄——</p><p>夫文者，道之流也；字者，玄之迹也。道无形而文显之，玄无象而字诠之。今集旧作，汇为《道玄文集》，非为炫才，实为存思。</p><p>昔者，伏羲画卦，文王演《易》，孔子赞《十翼》，皆以文载道，以辞明玄。老子著《道德》五千言，庄子作《南华》卅三篇，亦莫不如是。道不可言，而言以载之；玄不可述，而述以显之。故虽知言不尽意，然终不能无言。</p><p>《道玄文集》，辑录近年所作，或论《周易》之理，或阐禅宗之机，或述道家之思，或记游历之趣。虽文辞粗浅，然皆发于本心，不假雕饰。若有一二句能启人深思，则吾愿足矣。</p><p>文集之中，有《道玄疏》《道玄疏释》《道玄疏义》三篇，乃皈依时蒙恩师赐号“道玄”所作。师言：“道者，通也；玄者，妙也。汝当以文弘道，以思入玄。”故不揣浅陋，勉力为之。</p><p>又有《锡城旅情》《三星堆纪游》《刘文彩庄园记》诸篇，皆游历所感，或寄情山水，或思古抒怀。文字虽简，然皆当时心境，不敢妄改。</p><p>至于《简朴思》《灶台菩萨本生经》《献给大姐》等篇，则记家事亲情，虽琐碎细微，然情真意切。人生在世，无非饮食起居、悲欢离合，若能于平凡中见道，于细微处悟玄，则处处皆是文章。</p><p>今将此集刊于公众号，非求闻达，但求与同道者共论。若读者能于此中得一二启发，或莞尔一笑，或掩卷长思，则吾文不负矣。</p><p>赞曰：<br>道本无言，文以载之；<br>玄本无象，字以诠之。<br>愿诸君读此文集，<br>如对明月，如饮清茶，<br>虽不能尽道玄之妙，<br>亦可略窥一斑。</p><p>——道玄 谨识<br></p><p>附记：</p><p>乙巳年六月十四日，经2天的学习测试，成功的将《道玄文集》发布到微信公众号。为微信公众号撰写开篇辞。</p>"
  },

    "id": 84,
    "title": "自新疏​",
    "category": "疏",
    "date": "乙巳年五月十五日",
    "content": "<p><br>—— 仿《周易・系辞》体​</p><p>夫自者，返本之谓也。​<br>无妄而复礼，复礼而生明德，明德昭彰而万善流形。自之为功，惟精惟一，然其效可征：在乾为惕，在坤为厚，在人为诚。故《书》曰：“克明峻德，皆自明也。” 刚柔相济，显诸行而藏诸衷，此自之体也。​</p><p>新者，革故之谓也。​<br>更化谓之新，新之又新，大化之门。其理若岁序之迁流，其用若鼎器之革物。新非徒变，实乃天德日新之机：商盘铭 “苟日新” 而澡身浴德，周髀演数理而穷变通久。故君子观其新命，则知进退之宜，通昼夜之道。​</p><p>自新相成，显微一贯。​<br>自省则新萌，如草木之甲坼；新积则自显，若江河之朝宗。自者其根，新者其华，根华相养而德业以崇。昔汤铭日新，孔传新民，皆以自新为枢。今张公承名，当法天运之健，师地载之章，致良知于旦夕，成岁功于毫芒。​</p><p>赞曰：​<br>自非固我，新非常名。​<br>去故取新，是谓永贞。​<br>天之所助，德业斯成。</p><p></p><p>注释：</p><p> 致词：老哥安好！每次见您，总被那份 “返本守真” 的通透打动。在你身上学到的，何尝不是 “自省则新萌，新积则自显” 的道理？凑了篇《自新疏》，说的是 “自非固我，新非常名”，其实想赞的，正是您这般越活越澄澈的心境。小弟无以为敬，唯愿老哥岁岁常新，福寿安康。</p><p>文章共有四段：</p><p>第一段 ，\"自\"字解：返本复性之功</p><p> 第二段，\"新\"字解：革故鼎新之德 </p><p>第三段，二者关系：显微无间之妙</p><p> 第四段，结赞：</p><p>呼应《汤诰》\"苟日新\"与《周易》\"大业日新\" 末句\"永贞\"取自《坤》卦\"用六永贞\"，喻持守正道而终获天助） </p><p> 白话文翻译：</p><p>  《自新疏》</p><p> —— 仿照《周易・系辞》的体例 </p><p> 所说的“自”，就是回归本源的意思。</p><p>  没有虚妄的念头而回归礼制，回归礼制就会生出美好的品德，美好的品德彰显出来，各种善行就会随之形成。“自”所起的作用，专一且纯粹，然而它的效果是可以验证的：在《周易》的乾卦中表现为警惕，在坤卦中表现为厚重，在为人上表现为真诚。所以《尚书》说：“能够彰显崇高的品德，都是从自我明察开始的。”刚强与柔和相互配合，在行为中彰显出来，又隐藏在内心之中，这就是“自”的实质。</p><p>  所说的“新”，就是革除旧有的意思。</p><p>  变革更新称作“新”，不断更新再更新，就进入了《周易》中《大化》卦（此处为便于理解，结合文意推测，实际《周易》无直接“大化”卦表述，但“大化之门”可理解为一种大的变革、进化的境界）所象征的境界。它的道理如同四季的更替流转，它的作用如同鼎器能改变事物的形态。“新”并非只是简单的变化，实际上是上天赋予的品德不断更新的契机：商汤在盘上刻下“苟日新”来提醒自己每日更新，从而修养身心、涵养品德；周髀（周髀算经为古代数学著作。取其计算精准之意）推演数理来穷尽变化的道理、通达长久的规律。所以君子观察“新”的使命，就能知晓进退的适宜时机，明白昼夜交替的道理。</p><p>  “自”与“新”相互成就，细微与显著一贯相通。</p><p>  自我反省就会有新的变化萌生，就像草木发芽；新的变化不断积累，“自”就会显现出来，如同江河奔向大海。 “自”是根本，“新”是花朵，根本与花朵相互滋养，品德和事业就能得以崇高。过去商汤在盘上刻下“日新”来提醒自己，孔子传授“新民”的理念，都是把“自新”作为关键。如今张公继承了这一美名，就效法天体运行的刚健有力，学习大地的包容承载，在每时每刻都致力良知，在细微之处成就一年的功业。</p><p>  赞辞说： “自”并非固执自我，“新”并非寻常的名号。 去除旧的，选取新的，这样才能永远保持正道。 得到上天的帮助，品德和事业就能成功。</p><p>  生僻字词、典故注释 </p><p>生僻字词 </p><p>自者，返本之谓也 返本：回归本源。“本”指事物的根源、本质。 无妄而复礼 无妄：没有虚妄、不真实的念头。“妄”有虚妄、荒诞之意。 复礼：回归到礼制。“礼”是古代社会的道德规范和行为准则。 昭彰：明显、彰显。“昭”有光明、显著之意，“彰”也是明显的意思。 万善流形：各种善行随之形成。“流形”指形成、产生。 惟精惟一：专一且纯粹。“惟”有只、仅仅之意。 效可征：效果是可以验证的。“征”有证明、验证之意。 在乾为惕：在《周易》的乾卦中表现为警惕。“惕”指警惕、小心。 在坤为厚：在坤卦中表现为厚重。“厚”有宽厚、敦实之意。 衷：内心。 更化谓之新：变革更新称作“新”。“更化”即变革、改变。 大化之门：大的变革、进化的境界。“化”有变化、进化的意思。 岁序之迁流：四季的更替流转。“岁序”指一年中季节的顺序，“迁流”指变化、流动。 鼎器之革物：鼎器能改变事物的形态。“鼎器”是古代的炊具，也象征着变革的工具，“革物”即改变事物。 商盘铭 “苟日新”：商汤在盘上刻下“苟日新”。“盘”指浴盆，“苟日新”意思是如果能够一天新，就应保持天天新，新了还要更新。 澡身浴德：修养身心、涵养品德。“澡身”指洗涤身体，引申为修养身心，“浴德”指涵养品德。 周髀演数理：周公（此处结合文意推测，周髀算经与古代数学相关，此处取其探索数理之意）推演数理。“髀”可能指周公或相关数学研究，这里取其探索、变革数理之意，“演数理”即推演、研究数学道理。 穷变通久：穷尽变化的道理、通达长久的规律。“穷”有穷尽之意，“通久”指通达长久。 新命：“新”的使命。 昼夜之道：昼夜交替的道理。 自省则新萌：自我反省就会有新的变化萌生。“省”指反省、反思。 甲坼（chè）：草木发芽。“甲”指草木的外壳，“坼”有裂开之意。 朝宗：奔向大海。“朝”有朝向之意，“宗”指大海，古人认为江河都奔向大海，所以用“朝宗”来形容。 根华：根本与花朵。“根”是植物的根基，“华”同“花”，指花朵。 崇：崇高、提升。 汤铭日新：商汤在盘上刻下“日新”来提醒自己。“铭”指刻在器物上的文字。 孔传新民：孔子传授“新民”的理念。“传”有传授、传播之意，“新民”出自《大学》“大学之道，在明明德，在亲民，在止于至善”，“亲民”在朱熹等学者看来应作“新民”，有使民众革新的意思。  法天运之健：效法天体运行的刚健有力。“法”指效法、学习，“天运”指天体的运行。 师地载之章：学习大地的包容承载。“师”指效法、学习，“地载”指大地承载万物，“章”可理解为章法、规则或美好的特质。 致良知于旦夕：在每时每刻都致力良知。“致”有达到、致力之意，“良知”是王阳明心学中的重要概念，指人天生的道德判断能力，“旦夕”指每天、每时每刻。 毫芒：细微之处。“毫”和“芒”都是非常细小的东西，这里指细微之处。 永贞：永远保持正道。“永”有永远之意，“贞”指正道、坚定。 </p><p>典故 <br>《书》曰：“克明峻德，皆自明也。”<br> 出处：《尚书·虞书·尧典》。 含义：这句话强调能够彰显崇高的品德，都是从自我明察开始的，体现了“自”对于明德的重要性。</p><p> 商盘铭 “苟日新”<br> 出处：《礼记·大学》中记载商汤在盘上刻下“苟日新，日日新，又日新”。 含义：用商汤以“苟日新”来提醒自己每日更新，从而修养身心、涵养品德的典故，来体现“新”所蕴含的不断自我更新、提升品德的意义。</p><p> 周髀演数理而穷变通久<br> 出处：结合文意推测，周髀算经是古代数学著作，这里可能指古代学者（如周公等）对数理的研究探索，以体现变革、通达长久的道理。 含义：用古代学者推演数理来穷尽变化的道理、通达长久的规律的典故，来体现“新”所蕴含的变革、探索的精神。</p><p> 汤铭日新<br> 出处：同商盘铭 “苟日新”，强调商汤以“日新”提醒自己不断更新。 含义：突出“自新”中“新”的重要性，以及古人对自我更新的重视。</p><p> 孔传新民<br> 出处：《大学》中“大学之道，在明明德，在亲民，在止于至善”，朱熹等学者认为“亲民”应作“新民”。 含义：体现孔子及儒家思想中对通过自我更新来使民众革新的重视，将“自新”的理念推广到社会层面。</p>"
  },

    "content": "<p>—— 仿《周易・系辞》体以颂三省轩主​</p><p>夫康者，刚健中正之谓也。​<br>无陂而行健，行健而生明德，明德广被而万类咸亨。康之为道，惟精惟一，然其用可久：在军为毅，在政为直，在文为醇。故《彖》曰：“刚健而不陷，其义不困穷。” 文武相济，显诸戎马而藏诸翰墨，此康之体也。​</p><p>年者，积厚流光之谓也。​<br>久成谓之年，年之又年，大畜之门。其理若泰伯之让德绵延，其用若梁溪之涵育深广。年非徒往，实乃天人性命之机：范蠡舟泛五湖而知进退之节，李纲笏击丹墀而守孤忠之操。故君子观其年轮，则知经权之变，通出处之常。​</p><p>康年相成，显微一贯。​<br>康毅则年永，如锡山之苍翠不凋；年深则康粹，若惠泉之清泠常注。康者其神，年者其形，神形相养而德业以崇。昔仲淹忧乐关天下，阳明知行合一贯古今，皆以康年为枢。今三省承名，当法天行之健，师地载之章，致中和于砚田，成岁功于毫素。​</p><p>赞曰：​<br>康非苟安，年不虚度。​<br>三省九思，是谓永固。​<br>得太伯之遗风，与梁溪而长清。​<br></p><p>注释：</p><p> 致词：老哥安好！想起您刚健如松、厚积若山的性情，总觉得该写点什么才不负这份敬重。闲来仿古人笔法作《康年疏》，字里藏着您戎马或笔耕里的 “康毅”，也藏着岁月沉淀的 “年深”—— 就像锡山苍翠不凋，惠泉清泠常流。小弟笔拙，不过是借文字祝您康健如日，福寿似川，往后日日都如梁溪春水，从容悠长。 </p><p> 字词、典故注释 </p><p> 陂（bēi）：在这里指偏斜、不公正。 咸亨（xián hēng）：万物都能顺利发展。“咸”是都的意思，“亨”有顺利之意。 毅（yì）：坚毅、果敢。 醇（chún）：醇厚、纯粹。 经权（jīng quán）：“经”指常规、原则，“权”指变通、权宜。经权之变就是懂得在坚持原则的基础上灵活变通。 出处（chū chǔ）：“出”指出仕、做官，“处”指隐退、不仕。出处之常就是明白出仕与隐退的常规。 崇（chóng）：崇高、提升。 赞曰（zàn yuē）：用于文章结尾的赞辞，表达对前文内容的总结和赞美。</p><p>  ◆《彖》曰：“刚健而不陷，其义不困穷。” 出处：《周易·彖传》。 含义：这句话强调了刚健的品质能够避免陷入困境，其意义不会穷尽，是对“康”所蕴含的刚健中正之道的一种阐释。 </p><p> ◆泰伯之让德绵延 出处：泰伯是周太王古公亶父的长子，为了让三弟季历顺利继位，从而将王位传给姬昌（周文王），他和二弟仲雍一起逃到荆蛮之地，建立了吴国。他的让德被后世传颂。 含义：用泰伯让出王位，使美德代代相传的典故，来比喻“年”所蕴含的积累深厚而美德绵延的道理。 </p><p> ◆梁溪之涵育深广 出处：梁溪是李纲的号，李纲是两宋之际的抗金名臣、民族英雄。 含义：以李纲的涵养培育，深远广博来比喻“年”所具有的深厚影响和作用。 </p><p> ◆范蠡舟泛五湖而知进退之节 出处：范蠡是春秋末期越国的大夫，帮助越王勾践复国后，深知勾践只能共患难不能同富贵，于是驾着小船泛游五湖，隐居起来。 含义：用范蠡懂得进退的节度，来体现“年”所蕴含的把握时机、知进知退的道理。  </p><p>◆李纲笏击丹墀而守孤忠之操 出处：靖康元年（1126 年），金兵围攻汴京，李纲力主抗金，在朝堂上与投降派激烈辩论，情急之下用手中的笏板敲击宫殿前的红色台阶，以表达内心的愤怒和不满，但他始终坚守抗金的忠诚。 含义：用李纲坚守孤独忠诚的气节，来体现“年”所蕴含的在时间积累中坚守原则的精神。 </p><p> ◆仲淹忧乐关天下 出处：范仲淹在《岳阳楼记》中写道“先天下之忧而忧，后天下之乐而乐”。 含义：强调范仲淹以天下人的忧乐为自己的忧乐，具有高尚的品德和博大的胸怀，把“康年”所蕴含的精神体现得淋漓尽致。  </p><p>◆阳明知行合一贯古今 出处：王阳明是明代著名的思想家、哲学家，他提出了“知行合一”的观点，认为知识和行动是不可分割的整体。 含义：说明王阳明将“康年”所蕴含的精神贯通古今，具有深远的影响。</p><p>   白话文翻译：</p><p> 《康年疏》</p><p> —— 仿照《周易・系辞》的体例来颂扬三省轩的主人 </p><p> 所说的“康”，就是刚健且中正的意思。</p><p>  没有偏斜而能刚健前行，刚健前行就会生出美好的品德，美好的品德广泛传播，万物都能顺利发展。“康”所蕴含的道理，专一且纯粹，然而它的作用却能长久：在军事上表现为坚毅，在政治上表现为正直，在文教上表现为醇厚。所以《彖传》说：“刚健而不陷入困境，它的意义就不会穷尽。”文治与武功相互配合，在战争中彰显出来，又隐藏在笔墨文章里，这就是“康”的实质。 </p><p> 所说的“年”，就是积累深厚而影响久远的意思。</p><p>  长久积累才称作“年”，一年又一年地积累，就进入了《周易》中《大畜》卦所象征的境界。它的道理如同泰伯让出王位，让美德代代相传；它的作用如同梁溪（李纲）的涵养培育，深远而广博。“年”并非只是时间的流逝，实际上是天、人、性、命的枢机：范蠡驾着小船泛游五湖，懂得进退的节度；李纲用笏板敲击宫殿台阶，坚守着孤独忠诚的气节。所以君子观察年轮（这里比喻时间积累），就能知晓变通与坚守原则的道理，明白出仕与隐退的常规。 </p><p> “康”与“年”相互成就，细微与显著一贯相通。</p><p>  刚健坚毅就能让“年”长久，就像锡山（无锡）的松柏苍翠永不凋零；“年”积累深厚就能让“康”纯粹，如同惠山的泉水清凉常流。“康”是精神层面，“年”是外在表现，精神与外在相互滋养，品德和事业就能得以崇高。过去范仲淹以天下人的忧乐为忧乐，王阳明知行合一贯通古今，都是把“康年”作为关键。如今三省轩主人继承了这一美名，应当效法天体运行的刚健有力，学习大地的包容承载，在书写创作的领域里达到和谐平衡，在笔墨纸张上成就一年的功业。</p><p>  赞辞说： “康”并非苟且偷安，“年”不是虚度光阴。 三省吾身，九思明辨，这样才能永远稳固。 得到泰伯的遗风，与梁溪（李纲）的精神一样长久清正。</p>"

    "content": "<p><br>云想衣裳月想容，<br>天然标格出尘中。<br>玉壶未改冰心色，<br>金谷犹存澹泊风。<br>世味尝来知笋苦，<br>人情阅尽识茶浓。<br>雪窗每忆围炉夜，<br>一点春温万壑融。<br></p><p>注释：</p><p>\"金谷\"典（西晋石崇奢园）反衬澹泊<br> \"雪窗围炉\"藏前尘往事</p>"
  },
  {
    "id": 87,
    "title": "铸剑为锄：十年牢狱磨砺后的澄明与坚守",
    "category": "诗",
    "date": "乙巳年六月",
    "content": "<p><br>一、剑铭<br>淬火几番终作犁<br>十年磨就刃自饴<br>人间若问真筋骨<br>不在锋芒在钝时</p><p>二、茶则<br>沉浮三沸见澄明<br>浓淡皆凭火候成<br>世上荣枯壶里看<br>几片青霜是旧盟</p><p>三、砚铭<br>墨海澄波自写真<br>研磨世味入纹冰<br>纵然万贯缠腰后<br>犹记槐荫借伞人<br></p><p>注释：</p><p> 剑铭篇 </p><p> 淬火几番终作犁  </p><p>“淬火” 是十年囹圄的隐喻：铁窗内的规训如烈焰灼身，自由的割裂似冰水淬骨，尊严的磨损、过往的撕扯、日夜的反思，恰如金属在冰火间反复淬炼 —— 每一次 “淬火” 都是身心的极致煎熬，却也让生命的质地愈发纯粹。而 “终作犁” 的 “犁”，绝非普通的工具蜕变，而是与过去的彻底切割：曾如利刃般伤人伤己的锋芒，蜕变为能扎根土地、耕耘生活的 “犁”。它意味着刑满释放后，选择以踏实代替浮躁，以平和消解戾气，在文墨中重塑价值，将沉重的过往化为对安稳的敬畏 —— 如同犁深耕土地，在新的人生里种下 “不再重蹈覆辙” 的警醒与希望。 </p><p> 十年磨就刃自饴  </p><p>“十年磨” 不是主动的精进，而是被动却必须的淬炼：漫长监禁中，磨去的是浮躁的戾气、对命运的怨怼；磨出的 “刃”，亦非攻击性的锋芒，而是内心的坚韧与清醒 —— 是对规则的敬畏之 “刃”，对责任的担当之 “刃”，更是绝境中守住人性底线的精神之 “刃”。而 “自饴” 的 “饴”，藏着苦难后的回甘：它不是轻松的愉悦，而是熬过十年后的释然，是自我救赎中找到的平衡 —— 是通过阅读背诵（共计背诵5万余字的古典著作）、反思、劳动，在封闭环境中为自己开辟出精神角落，最终能平静接纳过往，甚至从磨砺中汲取 “向阳而生” 的力量。这种在绝望中生出的生命力，便是独属我的 “自饴”。</p><p> 两句合观，是特殊的生命轨迹：从 “淬火之痛” 到 “磨刃之艰”，终以 “作犁” 完成救赎。没有对苦难的廉价美化，只愿注解 “深渊里如何为自己磨出一线光”—— 真正的 “真筋骨”，从不在张扬的锋芒里，而在收敛后的沉静中，恰如宝刀收鞘时的厚重，比出鞘的寒光更显质地。 </p><p> （是谓大智若愚，大巧若拙。）  </p><p>茶则篇</p><p>  沉浮三沸见澄明  </p><p>煮茶时，茶叶在水中经三沸翻滚，从混沌到澄澈 —— 恰如人生：十年牢狱的颠簸、出狱后的挣扎、世态炎凉的冲击，都是 “三沸” 的历练。唯有熬过这些沉浮，才能褪去浮躁，显露出内心的澄明：看清何为重要，何为虚妄，在喧嚣中守住本真。 </p><p> 浓淡皆凭火候成 </p><p> 茶汤的浓淡，全在火候的拿捏；人生的成色，亦在对 “火候” 的把握 —— 顺境时不贪功，逆境时不颓丧，苦难时肯熬，安稳时能守。所谓 “火候”，是分寸，是耐心，更是在被动中主动沉淀的智慧，最终让每一段经历都化为生命的养分，浓有浓的醇厚，淡有淡的清冽。</p><p>  世上荣枯壶里看  </p><p>一把茶壶，盛得下沸水翻腾，也容得下茶沉茶浮 —— 正如观世间荣枯：昔日众友环绕的 “荣”，狱中空寂无人的 “枯”，出狱后人情冷暖的 “荣枯交替”，都可在壶中静静观照。不必怨怼，不必强求，不过是如茶般的自然流转，是谓于微末中见大道：一切起落，终会沉淀为生命的底色。 </p><p> 几片青霜是旧盟 </p><p> “青霜” 是陈茶的肌理，是岁月在普洱、茯茶上刻下的痕迹 —— 恰如我年过六旬的人生，十年牢狱是浓墨重彩的一笔，却磨不掉那些 “旧盟”：是狱中心念的 “要好好活”，是对曾经给与我温暖的朋友的记挂，是对 “不作恶、守本心” 的承诺。这 “几片青霜”，不是物是人非的怅然，而是历经时光发酵后愈发醇厚的坚守 —— 旧盟未改，初心仍在。</p><p>（是谓于微末观大道。）</p><p>   砚铭篇</p><p>  墨海澄波自写真  “墨海” 是我以文墨耕耘的天地，“澄波” 是历经磨难后的心境 —— 不浮躁，不偏执，如静水般通透。“自写真” 是借笔墨剖开自我：写十年牢狱的痛，写人情冷暖的悟，写重获新生的惜，在书写中观照内心，让每一个字都成为真实的注脚，不欺人，更不欺己。</p><p>  研磨世味入纹冰 </p><p> “世味” 是十年牢狱的苦、出狱后的酸、友人相助的暖、世态炎凉的涩 —— 我将这些滋味细细研磨，融入 “纹冰” 般的文字里：“纹” 是岁月刻下的痕迹，“冰” 是文字的清冽与真诚。不刻意煽情，不粉饰苦难，只将世味沉淀为平静的叙述，如冰藏万物，于沉静中见力量。  </p><p>纵然万贯缠腰后，犹记槐荫借伞人 </p><p> 若说 “万贯缠腰” 对我来说是不可能的事，不如说是对几位仁爱有加的朋友的赞颂。 如杨建礼、张自新、李书梅诸友，在我困厄时递过的茶、说过的暖语，如盛夏槐荫的清凉，是绝境中的生机。这份记挂，不是感恩的客套，而是富贵不淫，下交不渎的赞颂。</p><p> （ 是谓于沉静中观照自我，于世事中沉淀心境，于成功中铭记初心。）</p><p>  结语：</p><p> “铸剑为锄”，是十年牢狱赋予的生命哲学：“剑” 是苦难淬炼的锋芒，“锄” 是放下锋芒后的耕耘。剑铭写 “锋芒敛于钝” 的蜕变，是从 “被磨砺” 到 “懂收敛”；茶则写 “浮沉见澄明” 的通透，是从 “历苦难” 到 “悟大道”；砚铭写 “繁华守初心” 的坚守，是从 “活下来” 到 “活得真”。</p><p> 这三把 “钥匙”，打开的是同扇门：将苦难化为养分，将锋芒化为平和，在土地上深耕，在岁月里沉淀，最终活成自己敬佩的模样 —— 如犁垦荒，不问收获，只问耕耘。</p>"
  },

    "id": 88,
    "title": "七律·建礼赞",
    "category": "诗",
    "date": "乙巳年六月",
    "content": "<p><br>铁窗冰锁十年身，<br>沧海归来剩几人？<br>世态炎凉茶作证，<br>交情贵贱酒为真<br>已拌市井嗤顽石，<br>肯向风尘浣素巾<br>最是围炉风雪夜，<br>一灯如月照心春</p><p></p><p>注释：</p><p> 已拌市井嗤顽石：在世俗人眼里，嘲笑我是一块顽石。 <br> 肯向风尘浣素巾：不在世俗的 “风尘” 中，轻视或改变对我的情谊，反而像守护 “素巾” 般珍视这份交情，甚至帮 我拂去世俗的误解。（“浣” 的动作暗含 “洁净” 之意）。 <br> 浣素巾：也暗合\"下交不渎\"。“素巾”象征两人情谊 —— 不因 “风尘”（世俗变迁、身份落差）而褪色。</p>"

    "id": 89,
    "title": "沁园春•赠淑华",
    "category": "词",
    "date": "乙巳年六月",
    "content": "<p>眉若远山，<br>眸似清泉，<br>气胜幽兰。<br>更|勤如春燕，<br>衔泥筑梦；<br>慧同秋月，<br>照夜无言。<br>宦海扬帆，<br>蟾宫折桂，<br>犹带书香染素笺。<br>偏还有，<br>这侠肠似火，<br>暖了人间。</p><p>十年风雪摧残，<br>幸故友、<br>携春到眼前。<br>记洗尘酒暖，<br>消融块垒；<br>围炉话热，<br>熨透辛酸。<br>老骥扬蹄，<br>夕阳焕彩，<br>六十方开新纪元。<br>抬望眼，<br>正云开雾散，<br>共赴华年。<br></p><p>注释：</p><p> 致词：老同学安好！想起您为我洗尘之宴，总想写点什么，才不负这份恩情。闲来作《沁园春•赠淑华》一首，以表谢意。愚兄笔拙，不过是借文字赞您这般澄澈的心境。</p><p> 眉若远山，眸似清泉，气胜幽兰  </p><p>以山峦的朦胧舒展状写眉形之婉约， 用泉水的澄澈灵动喻眼神之纯净， 以兰花的清雅芬芳暗指气质之高洁，从眉眼到气韵，勾勒出人物的脱俗之态。  </p><p> 更勤如春燕，衔泥筑梦 </p><p> 以春燕衔泥筑巢的勤勉，赞其为理想踏实奋进；</p><p>慧同秋月，照夜无言</p><p> 借秋月默默映照黑夜的沉静，颂其聪慧内敛、不善张扬的特质，一动一静间显露出品格的丰盈。 </p><p> 宦海扬帆，蟾宫折桂  </p><p>点出在仕途和学业上的卓越成就。</p><p>犹带书香染素笺</p><p> 则强调其即便功成名就，仍不失文人的清雅本色；</p><p>偏还有，这侠肠似火，暖了人间</p><p> 笔锋一转，在才德与功名之外，凸显其炽热的侠义之心，让人物形象更添温度与厚度。  </p><p>十年风雪摧残，幸故友、携春到眼前</p><p>  以 “十年风雪” 喻十年牢狱，“摧残” 二字道尽监狱之苦；而 “故友携春” 则是转折，将学友的关怀比作驱散寒冬的春意，</p><p>到眼前</p><p>强调这份温暖的真切可感，奠定了从压抑到释然的基调。 </p><p> 记洗尘酒暖，消融块垒；围炉话热，熨透辛酸  </p><p>通过 “洗尘酒”“围炉话” 两个生活化场景，细腻描绘出情感的释放：酒的暖意不仅在身，更消融了我心中的郁结（块垒）；学友间的话语真挚热烈，如暖流般抚平过往的辛酸，将抽象的情感具象化为可感知的温暖。 </p><p> 老骥扬蹄，夕阳焕彩，六十方开新纪元 </p><p> 以 “老骥” 自喻，虽年逾六旬（“夕阳” 呼应年龄），却有 “扬蹄” 的昂扬斗志，打破 “暮年消沉” 的刻板印象，“新纪元” 三字彰显对未来的积极期许，充满生命力。</p><p>  抬望眼，正云开雾散，共赴华年 </p><p> 以 “云开雾散” 的意象收束，呼应开篇的 “风雪”，形成完整的叙事闭环；“共赴华年” 则将我个人的希望扩展到与学友同赴美好未来的愿景，境界更为开阔，余韵悠长。</p>"

                );
            }
            return filtered;
        }
 
        // 筛选文章 
        function filterArticles() {
            const selectedValue = document.getElementById('categoryFilter').value;  
            if (selectedValue) {
                activeFilter = selectedValue;
                renderArticleList();
                
                const filteredArticles = applyFilters();
                if (filteredArticles.length   > 0 && !filteredArticles.includes(articles[currentArticleIndex]))   {
                    loadArticle(0);
                }
            }
        }
 
        // 渲染目录 (新版-带动态ID)
        function renderArticleList() {
            const filteredArticles = applyFilters();
            const listContainer = document.getElementById('articleList'); 
            
            // 使用文档片段提高性能
            const fragment = document.createDocumentFragment(); 
            
            if (filteredArticles.length  > 0) {
                filteredArticles.forEach((article,  index) => {
                    const li = document.createElement('li'); 
                    const dynamicId = `article-${index + 1}`; // 动态生成ID 
                    
                    li.innerHTML  = `
                        <a href="#" 
                           onclick="loadArticle(${articles.indexOf(article)})" 
                           id="${dynamicId}"
                           class="${currentArticleIndex === articles.indexOf(article)  ? 'active' : ''}">
                            <span class="article-number">${index + 1}.</span>
                            ${currentSearchKeyword 
                                ? highlightKeyword(article.title,  currentSearchKeyword) 
                                : article.title} 
                            <small>(${article.category})</small> 
                        </a>
                    `;
                    fragment.appendChild(li); 
                });
            } else {
                const li = document.createElement('li'); 
                li.innerHTML  = `
                    <div style="text-align: center; padding: 15px; color: #7A8B7B;">
                        没有找到符合条件的文章 
                    </div>
                `;
                fragment.appendChild(li); 
            }
            
            // 一次性更新DOM
            listContainer.innerHTML  = '';
            listContainer.appendChild(fragment); 
        }
 
        // 加载文章 
        function loadArticle(index) {
            const filteredArticles = applyFilters();
            
            if (filteredArticles.length   === 0 || index < 0 || index >= filteredArticles.length)   return;
            
            document.getElementById('articleText').innerHTML   = '<div class="loading">🕯️ 文章加载中...</div>';
            
            setTimeout(() => {
                const article = filteredArticles[index];
                currentArticleIndex = articles.indexOf(article);  
                
                document.getElementById('articleTitle').textContent   = article.title;  
                document.getElementById('articleMeta').innerHTML   = `
                    <span>分类：${article.category}</span>  
                    <span>日期：${article.date}</span>  
                    <span>编号：${article.id}</span>  
                `;
                
let content = article.content;  
 
// 注释处理：支持多段落注释 
content = content 
    .replace(/<p>(注[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>')
    .replace(/<p>(附[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>')
    .replace(/<p>(注释[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>') 
    .replace(/<p>(附注[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>') 
    .replace(/<p>(附记[:：][\s\S]*?)(?=<p>《|$)/g, '<div class="annotation">$1</div>')
    .replace(/<p>《(.*?)》<\/p>/g, '<p class="poem-title">《$1》</p>');
 
// 非诗词类文章段落缩进 
if (article.category   !== '诗' && article.category   !== '词') {
    content = content.replace(/<p>/g,   '<p class="paragraph-indent">');
}
                // 关键词高亮 
                if (currentSearchKeyword) {
                    content = highlightContent(content, currentSearchKeyword);
                }
                
                document.getElementById('articleText').innerHTML   = content;
                updateNavButtons();
                
                document.querySelectorAll('.article-list   a').forEach((a, i) => {
                    a.classList.toggle('active',   i === index);
                });
                
                if (window.innerWidth   <= 768) {
                    switchTab('article');
                }
            }, 100);
        }
 
        // 更新导航按钮 
        function updateNavButtons() {
            const filteredArticles = applyFilters();
            const currentFilteredIndex = filteredArticles.indexOf(articles[currentArticleIndex]);  
            
            const prevButtons = document.querySelectorAll('#prevArticle,   #prevArticleBottom, #mobilePrevArticle');
            const nextButtons = document.querySelectorAll('#nextArticle,   #nextArticleBottom, #mobileNextArticle');
            
            prevButtons.forEach(btn   => {
                if (currentFilteredIndex > 0) {
                    btn.style.visibility   = 'visible';
                    btn.onclick   = function(e) {
                        e.preventDefault();  
                        loadArticle(currentFilteredIndex - 1);
                    };
                } else {
                    btn.style.visibility   = 'hidden';
                    btn.onclick   = null;
                }
            });
            
            nextButtons.forEach(btn   => {
                if (currentFilteredIndex < filteredArticles.length   - 1) {
                    btn.style.visibility   = 'visible';
                    btn.onclick   = function(e) {
                        e.preventDefault();  
                        loadArticle(currentFilteredIndex + 1);
                    };
                } else {
                    btn.style.visibility   = 'hidden';
                    btn.onclick   = null;
                }
            });
        }
 
        // 搜索功能 
        function searchArticles() {
            currentSearchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();  
            const filtered = articles.filter(article   => 
                article.title.toLowerCase().includes(currentSearchKeyword)   || 
                article.content.toLowerCase().includes(currentSearchKeyword)   ||
                article.category.toLowerCase().includes(currentSearchKeyword)  
            );
            
            const listContainer = document.getElementById('articleList');  
            listContainer.innerHTML   = filtered.map(article   => `
                <li>
                    <a href="#" onclick="loadArticle(${articles.indexOf(article)})">  
                        <span class="article-number">${article.id}.</span>  
                        ${highlightKeyword(article.title,   currentSearchKeyword)}
                        <small>(${article.category})</small>  
                    </a>
                </li>
            `).join('');
            
            if (filtered.length   === 0) {
                listContainer.innerHTML   = `
                    <li style="text-align: center; padding: 15px; color: #7A8B7B;">
                        未找到包含"${currentSearchKeyword}"的文章 
                    </li>
                `;
            }
            
            if (filtered.length   > 0) {
                loadArticle(articles.indexOf(filtered[0]));  
            }
        }
 
        // 关键词高亮 
        function highlightKeyword(text, keyword) {
            if (!keyword) return text;
            return text.replace(  
                new RegExp(`(${keyword})`, 'gi'),
                '<span class="highlight">$1</span>'
            );
        }
 
        // 文章内容关键词高亮 
        function highlightContent(html, keyword) {
            if (!keyword) return html;
            return html.replace(  
                new RegExp(`(${keyword})`, 'gi'),
                '<span class="highlight">$1</span>'
            );
        }
 
        // 键盘导航 
        document.addEventListener('keydown',   function(e) {
            if (e.key   === 'ArrowLeft') {
                const filteredArticles = applyFilters();
                const currentFilteredIndex = filteredArticles.indexOf(articles[currentArticleIndex]);  
                if (currentFilteredIndex > 0) {
                    loadArticle(currentFilteredIndex - 1);
                }
            } else if (e.key   === 'ArrowRight') {
                const filteredArticles = applyFilters();
                const currentFilteredIndex = filteredArticles.indexOf(articles[currentArticleIndex]);  
                if (currentFilteredIndex < filteredArticles.length   - 1) {
                    loadArticle(currentFilteredIndex + 1);
                }
            }
        });
 
        // 窗口大小改变时重新初始化侧边栏 
        window.addEventListener('resize',   initSidebar);
    </script>
</body>
