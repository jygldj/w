<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="道玄文集 - 古典诗词与散文杂记">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'  viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%235a3921'>📜</text></svg>">
    <title>道玄文集</title>
    <style>
        :root {
            --paper-color: #E8F1F2;
            --ink-color: #2E5E6E;
            --accent-color: #3A7B8C;
            --shadow-color: rgba(0,0,0,0.1);
        }
        
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        body {
            font-family: "楷体", "STKaiti", serif;
            background: var(--paper-color) fixed;
            color: var(--ink-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://img.zcool.cn/community/01f3fa5d18d473a801213f26e4776a.jpg@1280w_1l_2o_100sh.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            background-blend-mode: overlay;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        .book-cover {
            width: 90%;
            max-width: 800px;
            min-height: 60vh;
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.8s ease;
            display: flex;
            align-items: center;
        }
        
        .front-cover {
            background: rgba(232, 241, 242, 0.95);
            border: 1px solid #A3C4D2;
            box-shadow: 0 10px 25px var(--shadow-color);
            padding: 3rem;
            text-align: center;
            transform-origin: left center;
            backface-visibility: hidden;
            width: 100%;
        }
 
        .author-portrait {
            width: 280px;
            height: 350px;
            margin: 0 auto 2rem;
            background: url('https://6948.kstore.space/dx/wsf.webp')  center/cover;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            clip-path: ellipse(45% 50% at 50% 50%);
        }
        
        .open-book {
            display: inline-block;
            padding: 1rem 3rem;
            background: var(--accent-color);
            color: white;
            border-radius: 3px;
            font-size: 1.1rem;
            transition: all 0.3s;
            margin: 2rem 0;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px var(--shadow-color);
            font-family: "楷体", serif;
        }
        
        .open-book:hover {
            background: var(--ink-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 8px var(--shadow-color);
        }
 
        .friend-links {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
        }
        
        .friend-links a {
            color: var(--accent-color);
            text-decoration: none;
            margin: 0 15px;
            border-bottom: 1px dashed;
            padding-bottom: 3px;
            transition: all 0.3s;
        }
        
        .friend-links a:hover {
            color: var(--ink-color);
            border-bottom-style: solid;
        }
 
        .visit-counter {
            position: absolute;
            right: 30px;
            bottom: 30px;
            font-size: 0.9rem;
            color: #7A8B7B;
        }
        
        .book-cover.opened  {
            transform: rotateY(-150deg);
            pointer-events: none;
        }
 
        @media (max-width: 768px) {
            .front-cover {
                padding: 2.5rem;
            }
            
            .author-portrait {
                width: 220px;
                height: 280px;
            }
            
            .friend-links {
                bottom: 25px;
            }
            
            .visit-counter {
                right: 25px;
                bottom: 25px;
            }
        }
 
        @media (max-width: 480px) {
            .front-cover {
                padding: 2rem 1rem;
            }
            
            .author-portrait {
                width: 180px;
                height: 230px;
            }
            
            .friend-links {
                position: static;
                margin-top: 1.5rem;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.5rem;
            }
            
            .visit-counter {
                position: static;
                text-align: center;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="book-cover" id="bookCover">
        <div class="front-cover">
            <div class="author-portrait"></div>
            <button class="open-book" onclick="navigateWithAnimation()">进入文集</button>
            
            <div class="friend-links">
                <a href="https://6948.kstore.space/ckn/feiye.html"  target="_blank">三省轩主文集</a>
                <a href="https://6948.kstore.space/app/index.html"  target="_blank">道玄TV软件</a>               
                <a href="https://www.gushiwen.org/"  target="_blank">古诗文网</a>
                <a href="https://www.zhonghuashu.com/"  target="_blank">中华书库</a>
                <a href="https://mp.weixin.qq.com/mp/appmsgalbum?__biz=Mzk0ODc1MzcxMg==&action=getalbum&album_id=4070727578921992197#wechat_redirect"  target="_blank">微信公众号</a> 
            </div>
            
            <div class="visit-counter">
                今日访客: <span id="visitCount">0</span>
            </div>
        </div>
    </div>
 
    <script>
        // PWA支持 
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?ver=1.0');  
        }
        
        // 翻页动画导航
        function navigateWithAnimation() {
            document.getElementById('bookCover').classList.add('opened'); 
            setTimeout(() => {
                window.location.href  = "https://6948.kstore.space/dx/index1.html"; 
            }, 800);
        }
        
        // 访问计数
        (function() {
            const today = new Date().toLocaleDateString();
            const key = 'visit_' + today;
            let count = localStorage.getItem(key)  || 0;
            count = parseInt(count) + 1;
            localStorage.setItem(key,  count);
            document.getElementById('visitCount').textContent  = count;
        })(); 
    </script>
</body>
</html>
